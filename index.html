<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程在线答题系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        success: '#00B42A',
                        danger: '#F53F3F',
                        warning: '#FF7D00',
                        neutral: '#86909C'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- 头部区域 -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-primary mb-2">工程在线答题系统</h1>
            <p class="text-neutral">混凝土工程 / 岩土工程 | 满分150分 | 包含判断题、单选题、多选题</p>
        </header>

        <!-- 试卷选择 -->
        <div class="bg-white rounded-lg shadow-sm p-4 mb-6">
            <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                <div class="flex flex-col sm:flex-row sm:items-center gap-3">
                    <div class="flex items-center gap-2">
                        <label for="paperSelect" class="font-medium">选择试卷：</label>
                        <select id="paperSelect" class="border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary/50">
                            <option value="0">混凝土工程(一)</option>
                            <option value="1">混凝土工程(二)</option>
                            <option value="2">混凝土工程(三)</option>
                            <option value="3">岩土工程(一)</option>
                            <option value="4">岩土工程(二)</option>
                            <option value="5">岩土工程(三)</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <label for="modeSelect" class="font-medium">答题模式：</label>
                        <select id="modeSelect" class="border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary/50">
                            <option value="exam">模拟考试</option>
                            <option value="practice">练习模式</option>
                            <option value="wrong">错题集</option>
                        </select>
                    </div>
                    <div class="text-sm text-neutral">
                        错题：<span id="wrongBookCount" class="font-bold text-danger">0</span>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button id="resetBtn" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-md transition-colors">
                        重置答案
                    </button>
                    <button id="submitBtn" class="px-4 py-2 bg-primary text-white hover:bg-primary/90 rounded-md transition-colors">
                        提交答卷
                    </button>
                </div>
            </div>
        </div>

        <!-- 得分结果 -->
        <div id="resultCard" class="bg-white rounded-lg shadow-sm p-6 mb-6 hidden">
            <div class="text-center mb-4">
                <h2 class="text-2xl font-bold mb-2">答题结果</h2>
                <div class="text-4xl font-bold text-primary mb-1" id="totalScore">0</div>
                <p class="text-neutral">总分：150分 | 正确率：<span id="accuracy">0</span>%</p>
            </div>
            <div class="grid grid-cols-3 gap-4 text-center">
                <div class="bg-gray-50 rounded-lg p-3">
                    <div class="text-xl font-bold text-success" id="correctCount">0</div>
                    <p class="text-sm text-neutral">答对题数</p>
                </div>
                <div class="bg-gray-50 rounded-lg p-3">
                    <div class="text-xl font-bold text-danger" id="wrongCount">0</div>
                    <p class="text-sm text-neutral">答错题数</p>
                </div>
                <div class="bg-gray-50 rounded-lg p-3">
                    <div class="text-xl font-bold text-warning" id="unansweredCount">0</div>
                    <p class="text-sm text-neutral">未答题数</p>
                </div>
            </div>
        </div>

        <!-- 题目区域 -->
        <div id="questionsContainer" class="space-y-6">
            <!-- 题目将通过JS动态渲染 -->
        </div>

        <!-- 底部操作 -->
        <div class="mt-8 flex justify-center gap-4">
            <button id="resetBtnBottom" class="px-6 py-3 bg-gray-200 hover:bg-gray-300 rounded-md transition-colors">
                重置答案
            </button>
            <button id="submitBtnBottom" class="px-6 py-3 bg-primary text-white hover:bg-primary/90 rounded-md transition-colors">
                提交答卷
            </button>
        </div>
    </div>

    <script>
        // 试卷数据
        const papers = [
            // 混凝土工程(一)
            {
                name: "混凝土工程(一)",
                totalScore: 150,
                sections: [
                    {
                        type: "judge",
                        title: "一、判断题(每题1分,共30分)",
                        scorePerQuestion: 1,
                        questions: [
                            { id: 1, content: "其他拌和及养护用水配制的水泥砂浆28d抗压强度不得低于用标准饮用水配制的砂浆抗压强度的90%。", answer: "V" },
                            { id: 2, content: "普通硅酸盐水泥42.5及42.5R的3d抗压强度分别应大于17MPa及22MPa,抗折强度分别大于3.5MPa及4.0MPa。", answer: "V" },
                            { id: 3, content: "普通减水剂主要有木质素碳酸钙(木钙)、木质素磺酸钠(木钠)、木质素磺酸镁、三乙醇胺。", answer: "X" },
                            { id: 4, content: "石料软弱颗粒含量试验中对骨料粒径为10~20mm的,其加压荷载为0.25kN。", answer: "未提供" },
                            { id: 5, content: "粗骨料D80以上粒径的含泥量应<0.5%。", answer: "未提供" },
                            { id: 6, content: "橡塑止水带是利用其材质的不透水性和耐水性阻止水工建筑物上游水经过缝的渗漏。", answer: "未提供" },
                            { id: 7, content: "水工建筑物的变形接缝采用硬态(质)的黄铜片作为止水铜片。", answer: "X" },
                            { id: 8, content: "热轧带肋钢筋的拉伸试样和弯曲试样都为2根,应由所检批的钢筋中任选1根切取。", answer: "X" },
                            { id: 9, content: "常用水泥净浆的初凝时间≥45min,终凝时间≤8h。", answer: "X" },
                            { id: 10, content: "钢筋拉伸试验的两个数据平均后的平均值不小于标准规定的值就可认为其符合标准要求。", answer: "X" },
                            { id: 11, content: "除成型压混凝土试件振动密实时必须加压重块(试件表面压强为4900Pa)外,碾压混凝土性能试验方法与常态混凝土试验方法相同。", answer: "V" },
                            { id: 12, content: "V形漏斗试验方法用于测定自密实混凝土拌和物流动性。", answer: "X" },
                            { id: 13, content: "当试件高度/直径大于2时,试件中间部分不受端面摩阻力影响而处于单轴压缩状态。", answer: "未提供" },
                            { id: 14, content: "混凝土热物理性能试验结果用于大体积结构混凝土温度应力计算,决定是否需要分缝、表面保温或者是对原材料预冷,以防止温度裂缝。", answer: "未提供" },
                            { id: 15, content: "轻烧MgO膨胀剂是由菱镁矿石(MgCO₃)经过800°C左右温度烧、粉磨而成。", answer: "X" },
                            { id: 16, content: "骨料的岩石种类对混凝土干缩试验结果的影响表明,砂岩骨料的混凝土干缩最小,石英岩骨料的混凝土干缩最大。", answer: "未提供" },
                            { id: 17, content: "钢纤维混凝土试验方法与普通混凝土基本相同,其特有试验方法有钢纤维混凝土拌和物钢纤维体积率、钢纤维混凝土弯曲韧性和弯曲初裂强度及纤维混凝土收缩开裂等试验方法。", answer: "V" },
                            { id: 18, content: "水下不分散混凝土原材料与普通混凝土基本相同,其不同点是必须掺用抗分散剂,以及粗骨料最大粒径不宜超过40mm。", answer: "X" },
                            { id: 19, content: "混凝土的抗渗等级,以每组六个试件中三个出现渗水时的水压力乘以10表示。", answer: "X" },
                            { id: 20, content: "混凝土水胶比越大,混凝土越不密实、孔隙率越大,外界CO₂易侵入,越容易碳化。", answer: "V" },
                            { id: 21, content: "碾压混凝土层面抗剪强度(τ)与法向应力(σ)呈非线性关,直线与纵轴的截距是黏聚力。", answer: "X" },
                            { id: 22, content: "采用超声波测法检测裂缝深度时,当有钢筋穿过裂缝时,发射、接收换能器连线距离筋轴线的最短距离不宜小于裂缝深度的5倍,任何情况下不得小于4倍。", answer: "X" },
                            { id: 23, content: "当结构具备一对相互平行的测试面,且测试面间距较小时,应优先采用超声波双面斜测法检测裂缝深度。", answer: "V" },
                            { id: 24, content: "当换能器置于裂缝两侧并逐渐增大间距,首波的振幅相位先后发生90°的转动变化,即存在着一个使首波相位发生转动变化的临界点。", answer: "X" },
                            { id: 25, content: "超声波检测裂缝深度是基于混凝土的声阻抗远小于空气的声阻抗。", answer: "X" },
                            { id: 26, content: "混凝土抗压强度标准差高(4.5MPa)表示混凝土生产管理水平高。", answer: "X" },
                            { id: 27, content: "混凝土碳化是空气中的二氧化碳与混凝土中的氢氧化钙不断反应,使其碱度不断降低,促使钢筋表面的钝化膜破坏,引起钢筋锈蚀。", answer: "未提供" },
                            { id: 28, content: "现场混凝土质量检验以抗压强度为主,并以边长为150mm立方体试件的抗压强度为标准。", answer: "未提供" },
                            { id: 29, content: "超声回弹综合法需要测量的参数包括回弹值、碳化值和声速值。", answer: "X" },
                            { id: 30, content: "半电池电位法用于现场无破损检测海洋环境水工钢筋混凝土构筑物中钢筋腐蚀性状,该方法不适用于混凝土已饱水或接近饱水的构件。", answer: "未提供" }
                        ]
                    },
                    {
                        type: "single",
                        title: "二、单项选择题(每题1分,共40分)",
                        scorePerQuestion: 1,
                        questions: [
                            { id: 1, content: "水工混凝土常用的减水剂为( )。", options: ["A. 木质素磺酸钠(木钠)", "B. 松香热聚物", "C. 硫酸钠"], answer: "A" },
                            { id: 2, content: "硅酸盐水泥凝结时间在施工中有重要意义,其正确的范围是( )。", options: ["A. 初凝时间≥45min,终凝时间≤600min", "B. 初凝时间≥45min,终凝时间≤390min", "C. 初凝时间≤45min,终凝时间≥150min"], answer: "B" },
                            { id: 3, content: "根据《水工混凝土施工规范》(DL/T 5144-2001),混凝土和生产过程中,砂子、小石的含水量每()检测1次。", options: ["A. 4h", "B. 8h", "C. 台班", "D. 天"], answer: "A" },
                            { id: 4, content: "拌和水和养护水采用符合国家标准的饮用水。采用其他水质时pH值()。", options: ["A. >4", "B. >5", "C. >6"], answer: "A" },
                            { id: 5, content: "水泥胶砂强度检测,单个试件强度值超出平均值(),剔除。", options: ["A. ±5%", "B. ±10%", "C. ±15%"], answer: "B" },
                            { id: 6, content: "混凝土粗骨料吸水率限制值为()。", options: ["A. <2.5%", "B. ≤3.0%", "C. <3.5%", "D. <4.0%"], answer: "A" },
                            { id: 7, content: "水泥安定性检测,雷氏夹指针尖端间的距离增加值应不大于( )。", options: ["A. 3mm", "B. 4mm", "C. 5mm", "D. 6mm"], answer: "C" },
                            { id: 8, content: "碾压混凝土拌和物工作度测定的指标为( )。", options: ["A. 坍落度", "B. 坍扩度", "C. 维勃稠度VB值", "D. VC值"], answer: "D" },
                            { id: 9, content: "掺抗分散剂的水下不分散混凝土的28d水气强度比应( )。", options: ["A. >60%", "B. >70%", "C. >80%", "D. >90%"], answer: "B" },
                            { id: 10, content: "自流平自密实混凝土不宜掺用( )。", options: ["A. 减水剂", "B. 增黏剂", "C. 纤维", "D. 速凝剂"], answer: "D" },
                            { id: 11, content: "沥青混凝土中,粗骨料最大粒径应不大于表层厚度的( )。", options: ["A. 1/5", "B. 2/5", "C. 1/3", "D. 1/2"], answer: "C" },
                            { id: 12, content: "合格铜止水片抗拉强度应不低于( )。", options: ["A. 200MPa", "B. 220MPa", "C. 240MPa", "D. 260MPa"], answer: "C" },
                            { id: 13, content: "PVC止水带成品的扯断伸长率应()。", options: ["A. ≥250%", "B. ≥300%", "C. ≥350%", "D. ≥400%"], answer: "B" },
                            { id: 14, content: "热轧带肋钢筋拉伸试验试样长度要求为( )。", options: ["A. 5d", "B. 10d", "C. 0.5(d+a)+140mm", "D. 100mm"], answer: "A" },
                            { id: 15, content: "热轧带肋钢筋弯曲性能检测试样数为( )根。", options: ["A. 1", "B. 2", "C. 3", "D. 4"], answer: "B" },
                            { id: 16, content: "海水环境混凝土配合比设计中,混凝土配制强度应满足()。", options: ["A. 设计强度", "B. 耐久性要求所决定的强度", "C. 设计强度或耐久性要求所决定的强度", "D. 设计强度和耐久性要求所决定的强度"], answer: "D" },
                            { id: 17, content: "在设计混凝土配合比时,配制强度要比设计要求的强度等级高,提高幅度的多少,取决于()。", options: ["A. 设计要求的强度保证率", "B. 对坍落度的要求", "C. 施工水平的高低", "D. 设计要求的强度保证率和施工水平的高低"], answer: "D" },
                            { id: 18, content: "机械拌和一次拌和量不宜大于搅拌机容量的( )。", options: ["A. 70%", "B. 75%", "C. 80%", "D. 90%"], answer: "C" },
                            { id: 19, content: "碾压混凝土VC值测试的计时终点为()。", options: ["A. 透明塑料压板的整个底面与混凝土接触的空隙都被水泥浆填满", "B. 透明塑料压板的整个底面都与水泥浆接触,允许存在少量闭合气泡", "C. 塑料压板的周边侧面全部被泛上来的水泥浆覆盖", "D. 塑料压板周边全部出现水泥浆"], answer: "D" },
                            { id: 20, content: "混凝土大坝结构拉应力和温度应力计算,抗拉强度采用的是()。", options: ["A. 劈裂抗拉强度", "B. 抗弯强度", "C. 轴拉强度", "D. 抗剪强度"], answer: "C" },
                            { id: 21, content: "下列不属于普通混凝土用细骨料的质量要求应控制的指标是()。", options: ["A. 颗粒级配", "B. 含泥量", "C. 强度和坚固性"], answer: "C" },
                            { id: 22, content: "在预应力混凝土结构中,当采用钢绞线、钢丝、热处理钢筋做预应力钢筋时,混凝土强度等级可采用( )。", options: ["A. C30", "B. C40", "C. C50"], answer: "B" },
                            { id: 23, content: "对混凝土有利的变形为( )。", options: ["A. 徐变", "B. 干缩", "C. 湿涨"], answer: "C" },
                            { id: 24, content: "混凝土强度等级是根据()标准值来确定的。", options: ["A. 圆柱体抗压强度", "B. 立方体抗压强度", "C. 劈裂抗拉强度"], answer: "B" },
                            { id: 25, content: "钻芯法检测混凝土强度,对不同长径比的芯样应进行修正,若测得的长径比为1.2,则修正系数为( )。", options: ["A. =1", "B. >1", "C. <1"], answer: "A" },
                            { id: 26, content: "下列哪项指标中有任一项不合格的,即为不合格品水泥?()", options: ["A. 细度、终凝时间、强度、氧化镁", "B. 强度、安定性、氧化镁、初凝时间、终凝时间", "C. 强度、混合物掺加量、初凝时间、三氧化硫"], answer: "B" },
                            { id: 27, content: "对于建筑物的外部碾压混凝土,相对压实度不得小于()。", options: ["A. 96%", "B. 97%", "C. 98%"], answer: "C" },
                            { id: 28, content: "其他条件一定时混凝土强度随水灰比的增大而()。", options: ["A. 增大", "B. 不变", "C. 降低"], answer: "C" },
                            { id: 29, content: "混凝土抗冻等级F15号中的15是指( )。", options: ["A. 承受冻融循环的次数不少于15次", "B. 冻结后在15°C的水中融化", "C. 最大冻融次数后强度损失率不超过15%", "D. 最大冻融次数后质量损失率不超过15%"], answer: "A" },
                            { id: 30, content: "回弹法检测混凝土强度时,碳化深度测点数量不少于构件回弹测区数的()。", options: ["A. 10%", "B. 20%", "C. 30%"], answer: "C" },
                            { id: 31, content: "混凝土劈拉强度试验采用断面为5mm×5mm正方形钢垫条,试件尺寸为()立方体。", options: ["A. 15cm×15cm×15cm", "B. 20cm×20cm×20cm", "C. 45cm×45cm×45cm"], answer: "A" },
                            { id: 32, content: "收缩开裂试验每个试件各用1台电风扇吹试件表面,风向平行试件,风速为(),环境温度为20°C±2°C,相对湿度不大于60%。", options: ["A. 0.5m/s", "B. 1m/s", "C. 2m/s"], answer: "A" },
                            { id: 33, content: "GB1499.2-2007规定,根据需方要求钢筋可进行反向弯曲性能试验,反向弯曲的弯心直径比弯曲试验相应增加1个钢筋直径,先()向弯曲(),后()向弯曲()。", options: ["A. 正45°,反23°", "B. 正90°,反45°", "C. 反45°,正23°"], answer: "A" },
                            { id: 34, content: "牌号为Q235的低碳钢热轧圆盘条的拉伸性能指标为:屈服点()MPa,抗拉强度()MPa,伸长率()%。", options: ["A. 235,410,27", "B. 235,410,23", "C. 235,375,23"], answer: "B" },

                            { id: 7, content: "测定水泥净浆凝结时间试验中,试验步骤正确的是()。①称取水泥试样500g,以标准稠度用水量制成标准稠度的水泥净浆一次装满试模,振动数次后刮平,立即放入湿气养护箱中。记录水泥全部加入水中的时间作为凝结时间的起始时间。②初凝时间的测定。试件在湿气养护箱中养护至加水30min时进行第一次测定。③首先调整凝结时间测定仪,使试针接触玻璃板时指针对准零点。④终凝时间的测定。由水泥全部加入水中至终凝状态的时间为水泥的终凝时间。", options: ["A. ①②③④", "B. ②①③④", "C. ③②①④", "D. ③①②④"], answer: "D" },

                            { id: 9, content: "在测定水泥的安定性试验中,下列试验步骤正确的是()。①脱去玻璃板,取下试件,先测量雷氏夹指针尖端的距离,精确到0.5mm,接着将试件放到沸煮箱内水中试件架上,指针朝上,然后在(30±5)min内加热至沸并恒沸(180±5)min。②沸煮结束后,立即放掉沸煮箱里的热水,打开箱盖,待箱体冷却至室温,取出试件进行辨别。③将预先准备好的雷氏夹放在已稍擦油的玻璃板上,并立即将已制好的标准稠度的水泥净浆一次装满雷氏夹,装浆时一只手轻扶雷氏夹,另一只手用宽约10mm的小刀插捣数次,然后抹平,盖上涂油的玻璃板。随即将试件移至湿气养护箱内养护(24±2)h。④每个试样需成型两个试件,每个雷氏夹应配各质量为75~85g的玻璃板两块。一垫一盖,凡与水泥净浆接触的玻璃板和雷氏夹内表面都要稍稍地涂上一层油。", options: ["A. ③④①②", "B. ④③①②", "C. ②④③①", "D. ①④③②"], answer: "B" },

        // 全局变量
        let currentPaperIndex = 0;
        let userAnswers = {};
        let isSubmitted = false;

        // DOM元素
        const paperSelect = document.getElementById('paperSelect');
        const questionsContainer = document.getElementById('questionsContainer');
        const submitBtn = document.getElementById('submitBtn');
        const submitBtnBottom = document.getElementById('submitBtnBottom');
        const resetBtn = document.getElementById('resetBtn');
        const resetBtnBottom = document.getElementById('resetBtnBottom');
        const resultCard = document.getElementById('resultCard');
        const totalScore = document.getElementById('totalScore');
        const accuracy = document.getElementById('accuracy');
        const correctCount = document.getElementById('correctCount');
        const wrongCount = document.getElementById('wrongCount');
        const unansweredCount = document.getElementById('unansweredCount');

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderPaper(currentPaperIndex);
            
            // 试卷切换
            paperSelect.addEventListener('change', (e) => {
                currentPaperIndex = parseInt(e.target.value);
                resetQuiz();
                renderPaper(currentPaperIndex);
            });

            // 提交按钮
            submitBtn.addEventListener('click', submitQuiz);
            submitBtnBottom.addEventListener('click', submitQuiz);

            // 重置按钮
            resetBtn.addEventListener('click', resetQuiz);
            resetBtnBottom.addEventListener('click', resetQuiz);
        });

        // 渲染试卷
        function renderPaper(paperIndex) {
            const paper = papers[paperIndex];
            questionsContainer.innerHTML = '';

            paper.sections.forEach((section, sectionIndex) => {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'bg-white rounded-lg shadow-sm p-6';
                
                const sectionTitle = document.createElement('h2');
                sectionTitle.className = 'text-xl font-bold mb-4 pb-2 border-b border-gray-200';
                sectionTitle.textContent = section.title;
                sectionDiv.appendChild(sectionTitle);

                const questionsList = document.createElement('div');
                questionsList.className = 'space-y-4';

                section.questions.forEach((question, questionIndex) => {
                    const questionDiv = document.createElement('div');
                    questionDiv.className = 'question-item p-4 rounded-lg border border-gray-100 hover:border-primary/30 transition-colors';
                    questionDiv.id = `q-${sectionIndex}-${questionIndex}`;

                    const questionContent = document.createElement('div');
                    questionContent.className = 'font-medium mb-3 whitespace-pre-line';
                    const numberSpan = document.createElement('span');
                    numberSpan.className = 'text-primary mr-1';
                    numberSpan.textContent = `${question.id}.`;
                    questionContent.appendChild(numberSpan);
                    questionContent.appendChild(document.createTextNode(question.content));
                    questionDiv.appendChild(questionContent);

                    const optionsDiv = document.createElement('div');
                    optionsDiv.className = 'space-y-2 ml-4';

                    if (section.type === 'judge') {
                        // 判断题选项
                        ['V', 'X'].forEach(option => {
                            const label = document.createElement('label');
                            label.className = 'flex items-center gap-2 cursor-pointer';
                            label.innerHTML = `
                                <input type="radio" name="judge-${sectionIndex}-${questionIndex}" value="${option}" class="w-4 h-4 text-primary focus:ring-primary/50">
                                <span>${option === 'V' ? '对' : '错'}</span>
                            `;
                            label.querySelector('input').addEventListener('change', () => {
                                if (!isSubmitted) {
                                    userAnswers[`${sectionIndex}-${questionIndex}`] = option;
                                }
                            });
                            optionsDiv.appendChild(label);
                        });
                    } else if (section.type === 'single') {
                        // 单选题选项
                        question.options.forEach(option => {
                            const optionValue = option.charAt(0);
                            const label = document.createElement('label');
                            label.className = 'flex items-center gap-2 cursor-pointer';
                            label.innerHTML = `
                                <input type="radio" name="single-${sectionIndex}-${questionIndex}" value="${optionValue}" class="w-4 h-4 text-primary focus:ring-primary/50">
                                <span>${option}</span>
                            `;
                            label.querySelector('input').addEventListener('change', () => {
                                if (!isSubmitted) {
                                    userAnswers[`${sectionIndex}-${questionIndex}`] = optionValue;
                                }
                            });
                            optionsDiv.appendChild(label);
                        });
                    } else if (section.type === 'multiple') {
                        // 多选题选项
                        question.options.forEach(option => {
                            const optionValue = option.charAt(0);
                            const label = document.createElement('label');
                            label.className = 'flex items-center gap-2 cursor-pointer';
                            label.innerHTML = `
                                <input type="checkbox" name="multiple-${sectionIndex}-${questionIndex}" value="${optionValue}" class="w-4 h-4 text-primary focus:ring-primary/50">
                                <span>${option}</span>
                            `;
                            label.querySelector('input').addEventListener('change', (e) => {
                                if (!isSubmitted) {
                                    const key = `${sectionIndex}-${questionIndex}`;
                                    if (!userAnswers[key]) {
                                        userAnswers[key] = [];
                                    }
                                    if (e.target.checked) {
                                        userAnswers[key].push(optionValue);
                                        userAnswers[key].sort();
                                    } else {
                                        userAnswers[key] = userAnswers[key].filter(v => v !== optionValue);
                                    }
                                }
                            });
                            optionsDiv.appendChild(label);
                        });
                    }

                    questionDiv.appendChild(optionsDiv);

                    // 答案解析区域
                    const answerDiv = document.createElement('div');
                    answerDiv.className = 'answer-result mt-3 pt-3 border-t border-gray-100 hidden';
                    answerDiv.id = `ans-${sectionIndex}-${questionIndex}`;
                    questionDiv.appendChild(answerDiv);

                    questionsList.appendChild(questionDiv);
                });

                sectionDiv.appendChild(questionsList);
                questionsContainer.appendChild(sectionDiv);
            });
        }

        // 提交答卷
        function submitQuiz() {
            if (isSubmitted) return;
            isSubmitted = true;

            const paper = papers[currentPaperIndex];
            let score = 0;
            let correct = 0;
            let wrong = 0;
            let unanswered = 0;

            paper.sections.forEach((section, sectionIndex) => {
                section.questions.forEach((question, questionIndex) => {
                    const key = `${sectionIndex}-${questionIndex}`;
                    const userAnswer = userAnswers[key];
                    const correctAnswer = question.answer;
                    const questionDiv = document.getElementById(`q-${sectionIndex}-${questionIndex}`);
                    const answerDiv = document.getElementById(`ans-${sectionIndex}-${questionIndex}`);

                    if (!userAnswer || (Array.isArray(userAnswer) && userAnswer.length === 0)) {
                        unanswered++;
                        questionDiv.classList.add('bg-warning/5');
                        answerDiv.innerHTML = `<span class="text-warning font-medium">未作答</span> | 正确答案：<span class="text-success font-medium">${correctAnswer}</span>`;
                    } else {
                        let isCorrect = false;
                        if (section.type === 'multiple') {
                            // 多选题判断：完全正确得2分，少选每个正确选项得0.5分，错选不得分
                            const userAnsStr = userAnswer.join('');
                            if (userAnsStr === correctAnswer) {
                                isCorrect = true;
                                score += section.scorePerQuestion;
                            } else {
                                // 检查是否有错误选项
                                const hasWrongOption = userAnswer.some(opt => !correctAnswer.includes(opt));
                                if (!hasWrongOption) {
                                    // 少选，每个正确选项得0.5分
                                    const correctCount = userAnswer.filter(opt => correctAnswer.includes(opt)).length;
                                    score += correctCount * 0.5;
                                }
                            }
                        } else {
                            // 判断题和单选题
                            if (userAnswer === correctAnswer) {
                                isCorrect = true;
                                score += section.scorePerQuestion;
                            }
                        }

                        if (isCorrect) {
                            correct++;
                            questionDiv.classList.add('bg-success/5');
                            answerDiv.innerHTML = `<span class="text-success font-medium">回答正确</span> | 正确答案：<span class="text-success font-medium">${correctAnswer}</span>`;
                        } else {
                            wrong++;
                            questionDiv.classList.add('bg-danger/5');
                            const userAnsDisplay = Array.isArray(userAnswer) ? userAnswer.join('') : userAnswer;
                            answerDiv.innerHTML = `<span class="text-danger font-medium">回答错误</span> | 你的答案：<span class="text-danger">${userAnsDisplay}</span> | 正确答案：<span class="text-success font-medium">${correctAnswer}</span>`;
                        }
                    }

                    answerDiv.classList.remove('hidden');
                });
            });

            // 显示结果
            totalScore.textContent = score.toFixed(1);
            accuracy.textContent = ((score / paper.totalScore) * 100).toFixed(1);
            correctCount.textContent = correct;
            wrongCount.textContent = wrong;
            unansweredCount.textContent = unanswered;
            resultCard.classList.remove('hidden');

            // 滚动到结果区域
            resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });

            // 禁用所有输入
            document.querySelectorAll('input[type="radio"], input[type="checkbox"]').forEach(input => {
                input.disabled = true;
            });
        }

        // 重置答卷
        function resetQuiz() {
            isSubmitted = false;
            userAnswers = {};
            resultCard.classList.add('hidden');
            
            // 清空所有选择
            document.querySelectorAll('input[type="radio"], input[type="checkbox"]').forEach(input => {
                input.checked = false;
                input.disabled = false;
            });

            // 移除所有样式和答案
            document.querySelectorAll('.question-item').forEach(item => {
                item.classList.remove('bg-success/5', 'bg-danger/5', 'bg-warning/5');
            });
            document.querySelectorAll('.answer-result').forEach(div => {
                div.classList.add('hidden');
            });
        }

        // 练习模式与错题集增强
        let currentMode = 'exam';
        let checkedQuestions = {};
        const WRONG_BOOK_KEY = 'engineeringWrongBookV1';
        let wrongBook = loadWrongBook();
        const modeSelect = document.getElementById('modeSelect');
        const wrongBookCount = document.getElementById('wrongBookCount');

        document.addEventListener('DOMContentLoaded', () => {
            currentMode = modeSelect.value;
            modeSelect.addEventListener('change', (e) => {
                currentMode = e.target.value;
                resetQuiz();
            });
            renderPaper(currentPaperIndex);
            updateWrongBookCount();
            applyModeUI();
        });

        function loadWrongBook() {
            try {
                return JSON.parse(localStorage.getItem(WRONG_BOOK_KEY)) || {};
            } catch (error) {
                return {};
            }
        }

        function saveWrongBook() {
            try {
                localStorage.setItem(WRONG_BOOK_KEY, JSON.stringify(wrongBook));
            } catch (error) {
                // 本地存储不可用时，页面仍可正常练习。
            }
        }

        function updateWrongBookCount() {
            wrongBookCount.textContent = Object.keys(wrongBook).length;
        }

        function applyModeUI() {
            const isExamMode = currentMode === 'exam';
            submitBtn.classList.toggle('hidden', !isExamMode);
            submitBtnBottom.classList.toggle('hidden', !isExamMode);
            resetBtn.textContent = currentMode === 'wrong' ? '重做错题' : '重置答案';
            resetBtnBottom.textContent = currentMode === 'wrong' ? '重做错题' : '重置答案';
            if (!isExamMode) {
                resultCard.classList.add('hidden');
            }
        }

        function getAnswerKey(sectionIndex, questionIndex) {
            return `${sectionIndex}-${questionIndex}`;
        }

        function getQuestionKey(paperIndex, sectionIndex, questionIndex) {
            const paper = papers[paperIndex];
            const question = paper.sections[sectionIndex].questions[questionIndex];
            return `${paper.name}::${sectionIndex}::${question.id}`;
        }

        function normalizeMultiAnswer(answer) {
            const raw = Array.isArray(answer) ? answer.join('') : String(answer || '');
            return raw
                .replace(/[^A-Z]/g, '')
                .split('')
                .sort()
                .join('');
        }

        function isAnswerEmpty(answer) {
            return !answer || (Array.isArray(answer) && answer.length === 0);
        }

        function evaluateQuestion(section, question, userAnswer) {
            if (section.type === 'multiple') {
                const correctAnswer = normalizeMultiAnswer(question.answer);
                const userAnswerText = normalizeMultiAnswer(userAnswer);
                const selected = userAnswerText.split('').filter(Boolean);
                const isCorrect = userAnswerText === correctAnswer;
                let score = 0;

                if (isCorrect) {
                    score = section.scorePerQuestion;
                } else {
                    const hasWrongOption = selected.some(option => !correctAnswer.includes(option));
                    if (!hasWrongOption) {
                        score = selected.filter(option => correctAnswer.includes(option)).length * 0.5;
                    }
                }

                return {
                    isCorrect,
                    score,
                    userAnswerText,
                    correctAnswerText: correctAnswer || question.answer
                };
            }

            const correctAnswer = String(question.answer || '').trim();
            const userAnswerText = String(userAnswer || '').trim();
            const isCorrect = userAnswerText === correctAnswer;

            return {
                isCorrect,
                score: isCorrect ? section.scorePerQuestion : 0,
                userAnswerText,
                correctAnswerText: correctAnswer
            };
        }

        function setQuestionInWrongBook(paperIndex, sectionIndex, questionIndex, shouldKeep) {
            const key = getQuestionKey(paperIndex, sectionIndex, questionIndex);
            if (shouldKeep) {
                const paper = papers[paperIndex];
                const section = paper.sections[sectionIndex];
                const question = section.questions[questionIndex];
                wrongBook[key] = {
                    paperIndex,
                    sectionIndex,
                    questionIndex,
                    paperName: paper.name,
                    sectionTitle: section.title,
                    questionId: question.id,
                    updatedAt: Date.now()
                };
            } else {
                delete wrongBook[key];
            }
            saveWrongBook();
            updateWrongBookCount();
        }

        function setQuestionInputsDisabled(sectionIndex, questionIndex, disabled) {
            document.querySelectorAll(`#q-${sectionIndex}-${questionIndex} input`).forEach(input => {
                input.disabled = disabled;
            });

            const checkButton = document.getElementById(`check-${sectionIndex}-${questionIndex}`);
            if (checkButton && disabled) {
                checkButton.disabled = true;
                checkButton.textContent = '已检查';
                checkButton.className = 'px-3 py-1.5 rounded-md bg-gray-200 text-neutral cursor-not-allowed text-sm';
            }
        }

        function showQuestionResult(sectionIndex, questionIndex, result, status = 'answered') {
            const questionDiv = document.getElementById(`q-${sectionIndex}-${questionIndex}`);
            const answerDiv = document.getElementById(`ans-${sectionIndex}-${questionIndex}`);

            questionDiv.classList.remove('bg-success/5', 'bg-danger/5', 'bg-warning/5');
            answerDiv.classList.remove('hidden');

            if (status === 'unanswered') {
                questionDiv.classList.add('bg-warning/5');
                answerDiv.innerHTML = `<span class="text-warning font-medium">未作答</span> | 正确答案：<span class="text-success font-medium">${result.correctAnswerText}</span>`;
                return;
            }

            if (result.isCorrect) {
                questionDiv.classList.add('bg-success/5');
                answerDiv.innerHTML = `<span class="text-success font-medium">回答正确</span> | 正确答案：<span class="text-success font-medium">${result.correctAnswerText}</span>`;
            } else {
                questionDiv.classList.add('bg-danger/5');
                const scoreText = result.score > 0 ? ` | 本题得分：<span class="font-medium">${result.score.toFixed(1)}</span>` : '';
                answerDiv.innerHTML = `<span class="text-danger font-medium">回答错误</span> | 你的答案：<span class="text-danger">${result.userAnswerText || '未作答'}</span> | 正确答案：<span class="text-success font-medium">${result.correctAnswerText}</span>${scoreText}`;
            }
        }

        function checkQuestion(section, sectionIndex, question, questionIndex) {
            const answerKey = getAnswerKey(sectionIndex, questionIndex);
            const userAnswer = userAnswers[answerKey];

            if (isAnswerEmpty(userAnswer)) {
                const result = evaluateQuestion(section, question, '');
                showQuestionResult(sectionIndex, questionIndex, result, 'unanswered');
                return;
            }

            const result = evaluateQuestion(section, question, userAnswer);
            checkedQuestions[answerKey] = true;
            showQuestionResult(sectionIndex, questionIndex, result);
            setQuestionInWrongBook(currentPaperIndex, sectionIndex, questionIndex, !result.isCorrect);
            setQuestionInputsDisabled(sectionIndex, questionIndex, true);
        }

        function renderPaper(paperIndex) {
            const paper = papers[paperIndex];
            let renderedCount = 0;
            questionsContainer.innerHTML = '';
            applyModeUI();

            paper.sections.forEach((section, sectionIndex) => {
                const visibleQuestions = section.questions
                    .map((question, questionIndex) => ({ question, questionIndex }))
                    .filter(({ questionIndex }) => {
                        if (currentMode !== 'wrong') return true;
                        return Boolean(wrongBook[getQuestionKey(paperIndex, sectionIndex, questionIndex)]);
                    });

                if (visibleQuestions.length === 0) return;

                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'bg-white rounded-lg shadow-sm p-6';

                const sectionTitle = document.createElement('h2');
                sectionTitle.className = 'text-xl font-bold mb-4 pb-2 border-b border-gray-200';
                sectionTitle.textContent = section.title;
                sectionDiv.appendChild(sectionTitle);

                const questionsList = document.createElement('div');
                questionsList.className = 'space-y-4';

                visibleQuestions.forEach(({ question, questionIndex }) => {
                    renderedCount++;
                    const answerKey = getAnswerKey(sectionIndex, questionIndex);
                    const questionDiv = document.createElement('div');
                    questionDiv.className = 'question-item p-4 rounded-lg border border-gray-100 hover:border-primary/30 transition-colors';
                    questionDiv.id = `q-${sectionIndex}-${questionIndex}`;

                    const questionContent = document.createElement('div');
                    questionContent.className = 'font-medium mb-3 whitespace-pre-line';
                    const numberSpan = document.createElement('span');
                    numberSpan.className = 'text-primary mr-1';
                    numberSpan.textContent = `${question.id}.`;
                    questionContent.appendChild(numberSpan);
                    questionContent.appendChild(document.createTextNode(question.content));
                    questionDiv.appendChild(questionContent);

                    const optionsDiv = document.createElement('div');
                    optionsDiv.className = 'space-y-2 ml-4';

                    if (section.type === 'judge') {
                        ['V', 'X'].forEach(option => {
                            const label = document.createElement('label');
                            label.className = 'flex items-center gap-2 cursor-pointer';
                            label.innerHTML = `
                                <input type="radio" name="judge-${sectionIndex}-${questionIndex}" value="${option}" class="w-4 h-4 text-primary focus:ring-primary/50">
                                <span>${option === 'V' ? '对' : '错'}</span>
                            `;
                            label.querySelector('input').addEventListener('change', () => {
                                if (isSubmitted || checkedQuestions[answerKey]) return;
                                userAnswers[answerKey] = option;
                                if (currentMode !== 'exam') {
                                    checkQuestion(section, sectionIndex, question, questionIndex);
                                }
                            });
                            optionsDiv.appendChild(label);
                        });
                    } else if (section.type === 'single') {
                        question.options.forEach(option => {
                            const optionValue = option.charAt(0);
                            const label = document.createElement('label');
                            label.className = 'flex items-center gap-2 cursor-pointer';
                            label.innerHTML = `
                                <input type="radio" name="single-${sectionIndex}-${questionIndex}" value="${optionValue}" class="w-4 h-4 text-primary focus:ring-primary/50">
                                <span>${option}</span>
                            `;
                            label.querySelector('input').addEventListener('change', () => {
                                if (isSubmitted || checkedQuestions[answerKey]) return;
                                userAnswers[answerKey] = optionValue;
                                if (currentMode !== 'exam') {
                                    checkQuestion(section, sectionIndex, question, questionIndex);
                                }
                            });
                            optionsDiv.appendChild(label);
                        });
                    } else if (section.type === 'multiple') {
                        question.options.forEach(option => {
                            const optionValue = option.charAt(0);
                            const label = document.createElement('label');
                            label.className = 'flex items-center gap-2 cursor-pointer';
                            label.innerHTML = `
                                <input type="checkbox" name="multiple-${sectionIndex}-${questionIndex}" value="${optionValue}" class="w-4 h-4 text-primary focus:ring-primary/50">
                                <span>${option}</span>
                            `;
                            label.querySelector('input').addEventListener('change', (e) => {
                                if (isSubmitted || checkedQuestions[answerKey]) return;
                                if (!userAnswers[answerKey]) {
                                    userAnswers[answerKey] = [];
                                }
                                if (e.target.checked) {
                                    userAnswers[answerKey].push(optionValue);
                                    userAnswers[answerKey] = [...new Set(userAnswers[answerKey])].sort();
                                } else {
                                    userAnswers[answerKey] = userAnswers[answerKey].filter(value => value !== optionValue);
                                }
                            });
                            optionsDiv.appendChild(label);
                        });
                    }

                    questionDiv.appendChild(optionsDiv);

                    if (currentMode !== 'exam') {
                        const actionDiv = document.createElement('div');
                        actionDiv.className = 'mt-3 ml-4';
                        const checkButton = document.createElement('button');
                        checkButton.id = `check-${sectionIndex}-${questionIndex}`;
                        checkButton.className = 'px-3 py-1.5 rounded-md bg-primary text-white hover:bg-primary/90 transition-colors text-sm';
                        checkButton.textContent = section.type === 'multiple' ? '检查本题' : '查看结果';
                        checkButton.addEventListener('click', () => {
                            if (!checkedQuestions[answerKey]) {
                                checkQuestion(section, sectionIndex, question, questionIndex);
                            }
                        });
                        actionDiv.appendChild(checkButton);
                        questionDiv.appendChild(actionDiv);
                    }

                    const answerDiv = document.createElement('div');
                    answerDiv.className = 'answer-result mt-3 pt-3 border-t border-gray-100 hidden';
                    answerDiv.id = `ans-${sectionIndex}-${questionIndex}`;
                    questionDiv.appendChild(answerDiv);

                    questionsList.appendChild(questionDiv);
                });

                sectionDiv.appendChild(questionsList);
                questionsContainer.appendChild(sectionDiv);
            });

            if (renderedCount === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'bg-white rounded-lg shadow-sm p-8 text-center text-neutral';
                emptyDiv.textContent = currentMode === 'wrong' ? '当前试卷暂无错题。练习或模拟考试答错后会自动加入错题集。' : '当前试卷暂无题目。';
                questionsContainer.appendChild(emptyDiv);
            }
        }

        function submitQuiz() {
            if (currentMode !== 'exam' || isSubmitted) return;
            isSubmitted = true;

            const paper = papers[currentPaperIndex];
            let score = 0;
            let correct = 0;
            let wrong = 0;
            let unanswered = 0;

            paper.sections.forEach((section, sectionIndex) => {
                section.questions.forEach((question, questionIndex) => {
                    const answerKey = getAnswerKey(sectionIndex, questionIndex);
                    const userAnswer = userAnswers[answerKey];
                    const result = evaluateQuestion(section, question, userAnswer);

                    if (isAnswerEmpty(userAnswer)) {
                        unanswered++;
                        showQuestionResult(sectionIndex, questionIndex, result, 'unanswered');
                        setQuestionInWrongBook(currentPaperIndex, sectionIndex, questionIndex, true);
                    } else {
                        score += result.score;
                        if (result.isCorrect) {
                            correct++;
                        } else {
                            wrong++;
                        }
                        showQuestionResult(sectionIndex, questionIndex, result);
                        setQuestionInWrongBook(currentPaperIndex, sectionIndex, questionIndex, !result.isCorrect);
                    }
                });
            });

            totalScore.textContent = score.toFixed(1);
            accuracy.textContent = ((score / paper.totalScore) * 100).toFixed(1);
            correctCount.textContent = correct;
            wrongCount.textContent = wrong;
            unansweredCount.textContent = unanswered;
            resultCard.classList.remove('hidden');
            resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });

            document.querySelectorAll('input[type="radio"], input[type="checkbox"]').forEach(input => {
                input.disabled = true;
            });
            updateWrongBookCount();
        }

        function resetQuiz() {
            isSubmitted = false;
            userAnswers = {};
            checkedQuestions = {};
            resultCard.classList.add('hidden');
            renderPaper(currentPaperIndex);
            updateWrongBookCount();
            applyModeUI();
        }
    </script>
</body>
