<script id="question-data" type="application/json">[{"subject":"岩土工程","set":"一","type":"judge","number":1,"sourcePage":1,"text":"完整新鲜岩层,岩芯采取率必须大于95%。","answer":"F","id":"岩土工程-一-judge-01","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":2,"sourcePage":1,"text":"普朗特尔极限承载力公式推导时把土作为无质量的介质。","answer":"T","id":"岩土工程-一-judge-02","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":3,"sourcePage":1,"text":"钻孔压水试验宜采用泥浆钻进。","answer":"F","id":"岩土工程-一-judge-03","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":4,"sourcePage":1,"text":"射水法建造防渗墙适用于砂、砂性土、黏性土、淤泥质土及砂砾石堤基。","answer":"F","id":"岩土工程-一-judge-04","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":5,"sourcePage":1,"text":"锚杆支护是主动地加固岩土体,有效地控制其变形,防止围岩土体的\n塌。","answer":"T","id":"岩土工程-一-judge-05","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":6,"sourcePage":1,"text":"孔径变形法测试准备中,测试钻头钻测试孔,孔深为 50.cm,要求与大\n孔同轴,允许偏差为 2 mm。","answer":"T","id":"岩土工程-一-judge-06","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":7,"sourcePage":1,"text":"结构面直剪试验中施加剪切载荷时,规程建议在现场对抗剪强度较高\n的低塑性夹层按预估最大剪切载荷的5%分级施加。","answer":"F","id":"岩土工程-一-judge-07","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":8,"sourcePage":1,"text":"预应力锚索进行张拉时,超张拉载荷是指超过设计载荷的20%时的载\n荷值。","answer":"F","id":"岩土工程-一-judge-08","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":9,"sourcePage":1,"text":"已知甲土的含水率大于乙土的,则甲土的饱和度大于乙土的。（）","answer":"F","id":"岩土工程-一-judge-09","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":10,"sourcePage":1,"text":"当土中含水率低于缩限时,水分蒸发时的体积不再缩小。","answer":"T","id":"岩土工程-一-judge-10","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":11,"sourcePage":1,"text":"岩体的完整性系数是指岩体与相应岩块的弹性波传播速度比值的平\n方。","answer":"T","id":"岩土工程-一-judge-11","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":12,"sourcePage":1,"text":"土的含水率是指土体中水的质量与土体总质量之比,以百分数表示","answer":"F","id":"岩土工程-一-judge-12","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":13,"sourcePage":1,"text":"黏性土的膨胀性随蒙脱石含量的增加而增大。","answer":"T","id":"岩土工程-一-judge-13","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":14,"sourcePage":1,"text":"某土样 =20°,则该土样破坏面与小主应力作用面间的夹角为 35°","answer":"T","id":"岩土工程-一-judge-14","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":15,"sourcePage":1,"text":"环刀法测试土体原位密度试验,其适用于现场测定砂类土和砾类土的\n密度。","answer":"F","id":"岩土工程-一-judge-15","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":16,"sourcePage":1,"text":"十字板剪切试验适用于软黏土。","answer":"T","id":"岩土工程-一-judge-16","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":17,"sourcePage":2,"text":"梯度比 GR试验,是测定织物长期工作时判别其会不会被淤堵的一种\n试验。","answer":"T","id":"岩土工程-一-judge-17","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":18,"sourcePage":2,"text":"土体的压缩数 α1-2越大,其压缩性越小。","answer":"F","id":"岩土工程-一-judge-18","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":19,"sourcePage":2,"text":"无黏性土的抗剪强度与含水率密切相关。","answer":"F","id":"岩土工程-一-judge-19","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":20,"sourcePage":2,"text":"试验研究表明:对同一地基土体,基础的形状、尺寸及埋深不同,地基\n的承载力相同。","answer":"F","id":"岩土工程-一-judge-20","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":21,"sourcePage":2,"text":"岩石的自然吸水率越大,岩石的力学性质越好。","answer":"F","id":"岩土工程-一-judge-21","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":22,"sourcePage":2,"text":"群桩的承载力为单桩的承载力之和。","answer":"F","id":"岩土工程-一-judge-22","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":23,"sourcePage":2,"text":"排水固结预压法适用于加固松砂地基。","answer":"F","id":"岩土工程-一-judge-23","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":24,"sourcePage":2,"text":"测试岩石的抗拉强度,最常用的是劈裂法。","answer":"T","id":"岩土工程-一-judge-24","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":25,"sourcePage":2,"text":"在三轴压缩试验中,固结不排水条件下可测得土的有效内摩擦角","answer":"T","id":"岩土工程-一-judge-25","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":26,"sourcePage":2,"text":"土的孔隙比可能大于1。","answer":"T","id":"岩土工程-一-judge-26","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":27,"sourcePage":2,"text":"岩石冻融试验,根据工程需要确定冻融循环次数,以10 次为宜,严寒\n地区不应少于 15 次","answer":"F","id":"岩土工程-一-judge-27","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":28,"sourcePage":2,"text":"某均质土坝已建成多年,水位骤降时上游突然发生滑坡,则抗剪强度\n指标宜用快剪确定。","answer":"F","id":"岩土工程-一-judge-28","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":29,"sourcePage":2,"text":"标准贯入试验,将贯人器垂直打人试验土层中,先打人土中 15 cm,不\n计锤击数,继续贯入土中30 cm,记录其锤击数,此击数即为标准贯入\n击数。","answer":"T","id":"岩土工程-一-judge-29","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"judge","number":30,"sourcePage":2,"text":"对软岩进行点荷载试验时,在加载过程中上下两个球端圆锥容易贯\n人,当贯入深度较大时,用于计算的 De 值应取试件破坏瞬间加载点\n间的距离 L值。","answer":"T","id":"岩土工程-一-judge-30","typeLabel":"判断题"},{"subject":"岩土工程","set":"一","type":"single","number":1,"sourcePage":2,"text":"库仑强度准则认为岩石破坏主要是（\nB.拉伸破坏\nC.扭曲破坏\nA.压缩破坏\nD.剪切破坏","answer":"D","id":"岩土工程-一-single-01","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":2,"sourcePage":2,"text":"岩石抗拉强度（A人）岩石的抗压强度。\nB.等于\nA.小于\nC.大于\nD.小于等于\nA.弯曲试验法\nB.圆柱体径向压裂法\nC.劈裂法\nD.轴向拉伸法","answer":"A","id":"岩土工程-一-single-02","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":3,"sourcePage":2,"text":"最常用的岩石抗拉强度试验方法是（\nA.弯曲试验法\nB.圆柱体径向压裂法\nC.劈裂法\nD.轴向拉伸法","answer":"C","id":"岩土工程-一-single-03","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":4,"sourcePage":2,"text":"决定岩石抗拉强度的主要因素是(\nA.摩擦力\nB.黏结力\nC.摩擦力和黏结力\nD.摩擦力或黏结力","answer":"B","id":"岩土工程-一-single-04","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":5,"sourcePage":3,"text":"国内测试岩体表面变形最普遍的试验方法是（）。\nA.承压板法\nB.钻孔径向加压法\nC.液压枕径向加压法\nD.水压法","answer":"A","id":"岩土工程-一-single-05","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":6,"sourcePage":3,"text":"岩体变形试验中刚性承压板面积一般为(\nB.)cm\nA.0.1\nB.0.2 ~0.25\nC. 0.5\nD. 1.0","answer":"B","id":"岩土工程-一-single-06","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":7,"sourcePage":3,"text":"我国采用的岩体变形试验的稳定标准是(\nB)。\nA.以一定时间内变形的绝对变化值为标准\nB.以一定时间内变形的相对变化为标准\nC.以时间作为变形稳定标准\nD以一定时间内变形的绝对值作为变形稳定标准","answer":"B","id":"岩土工程-一-single-07","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":8,"sourcePage":3,"text":"规范规定,采用隧洞径向加压试验测试岩体变形时,覆盖层最小厚度、\n试洞间距及距临空面的距离应大于(\n)倍洞径。\nA.2\nB.3\nC. 5\nD.6","answer":"D","id":"岩土工程-一-single-08","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":9,"sourcePage":3,"text":"（）是现场测定岩体抗剪强度最常采用的方法。\nA.三轴压缩试验\nB.岩体荷载试验\nC.直剪试验\nD.以上答案都不对","answer":"C","id":"岩土工程-一-single-09","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":10,"sourcePage":3,"text":"现场岩体结构面抗剪试验中,试件尺寸应不小于（）。\nA.30 cm ×30 cm\nB.50 cm x.50 cm\nC.60 cm ×60 cm\nD.70 cm x70 cm","answer":"B","id":"岩土工程-一-single-10","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":11,"sourcePage":3,"text":"地基的承载力（\nA.大于\nB.小于\nC.等于","answer":"A","id":"岩土工程-一-single-11","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":12,"sourcePage":3,"text":"从土工合成材料样品上裁取试样时,试样的布置应采用下列方法\n（）。\nA.平行取样法\nB.梯形取样法\nC.均匀取样法","answer":"B","id":"岩土工程-一-single-12","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":13,"sourcePage":3,"text":"原状土试样制备时,发现土样已受扰动,取土质量也不符合要求,此时\n试验人员应（)。\nA.记录试样状态,按原先制定的试验程序进行各项试验\nB.尽快与委托方进行沟通,妥善处理并记录处理过程,并按原先制定\n的试验程序进行各项试验\nC.不制备力学性试验的试样，同时应尽快与委托方进行沟通,妥善处\n理并记录处理过程","answer":"C","id":"岩土工程-一-single-13","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":14,"sourcePage":4,"text":"岩石横波测试时，般采用(\n)耦合。\nA.铝箔\nB.凡士林\nC.黄油","answer":"A","id":"岩土工程-一-single-14","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":15,"sourcePage":4,"text":"室内侧限压缩试验测得的 ε－P曲线愈陡,表明该土样的压缩模量\nA.愈大\nB.愈小\nC.愈均匀","answer":"B","id":"岩土工程-一-single-15","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":16,"sourcePage":4,"text":"等效孔径0g的含义是允许（l\n)的颗粒(以质量计)通过筛布。\nA. 95%\nB.5%\nC. 0. 95%","answer":"B","id":"岩土工程-一-single-16","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":17,"sourcePage":4,"text":"岩石的饱和吸水率采用真空抽气法测定时,试件饱和抽气时间不得少\n于()。\nA.8 h\nB.6 h\nC.4 h","answer":"C","id":"岩土工程-一-single-17","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":18,"sourcePage":4,"text":"由原位载荷试验测定的地基荷载变形曲线上规定的变形所对应的荷\nB).\n载值称为(（\nA.地基承载力基本值\nB.地基承载力特征值\nC.地基承载力设计值","answer":"B","id":"岩土工程-一-single-18","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":19,"sourcePage":4,"text":"岩石的单轴抗压强度受加载速率的影响,单轴抗压强度试验加载速率\n一般控制在每秒(\nA. 0.5 ~ 1. 0 MPa\nB.0.1 ~0.5 MPa C. 1.0 ~2.0 MPa\n)。","answer":"A","id":"岩土工程-一-single-19","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":20,"sourcePage":4,"text":"土工合成材料试验的试样剪取最主要的原则是(\nB.代表性\nC.可靠性\nA.合理性","answer":"B","id":"岩土工程-一-single-20","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":21,"sourcePage":4,"text":"分析饱和黏土的短期稳定和短期承载力问题,应选择(\nA.固结排水强度指标\nB.固结不排水强度指标\nC.不固结不排水强度指标","answer":"C","id":"岩土工程-一-single-21","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":22,"sourcePage":4,"text":"如果土中含有有机质,采用烘干法测量其含水率时,烘干温度应控制\n在（）。\nA. 65 ~ 70℃\nB.85 ~90 ℃\nC. 105 ~ 110 ℃\n)可以进行快剪","answer":"A","id":"岩土工程-一-single-22","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":23,"sourcePage":4,"text":"直剪试验分为快剪、固结快剪和慢剪试验，下列（\n试验。\nB.砂土\nA.黏土\nC.粉土","answer":"A","id":"岩土工程-一-single-23","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":24,"sourcePage":4,"text":"黏性土样在进行固结试验前,应采用(\n(c)。\nA.水头饱和\nB.毛细管饱和\nC.抽气饱和\nB.颗分试验\nA.含水率试验\nC.土粒比重试验","answer":"C","id":"岩土工程-一-single-24","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":25,"sourcePage":4,"text":"下列试验中,可以采用风干样的是(\nB.颗分试验\nA.含水率试验\nC.土粒比重试验","answer":"B","id":"岩土工程-一-single-25","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":26,"sourcePage":4,"text":"酒精燃烧法测得的含水率一般B）烘干法测得的含水率。\nA.大于\nB.小于\nC.等于","answer":"B","id":"岩土工程-一-single-26","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":27,"sourcePage":5,"text":"计算地基承载力时,对地下水位以下的土层，土的重度应选用\nA.饱和重度\nB.天然重度\nC.浮重度\nD.平均重度","answer":"C","id":"岩土工程-一-single-27","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":28,"sourcePage":5,"text":"振冲法加固软黏土地基，下面说法正确的是(\nB )。\nA.以挤密作用为主\nB.以置换作用为主\nC.以固结作用为主\nD.以压缩作用为主","answer":"B","id":"岩土工程-一-single-28","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":29,"sourcePage":5,"text":"单桩压重法载荷试验的压重量一般应大于单桩极限承载力的\n)。\nA.0.5 倍\nB.1.0 倍\nC.1.2 倍\nD.2.0倍","answer":"C","id":"岩土工程-一-single-29","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":30,"sourcePage":5,"text":"十字板试验时应控制十字板头转速为（）。\nA.1°/s\nB. 1°/10 s\nC. 10°/s\nD.1°/min","answer":"B","id":"岩土工程-一-single-30","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":31,"sourcePage":5,"text":"自由膨胀率大于等于(\nA.35%\nB.40%\nC.50%","answer":"B","id":"岩土工程-一-single-31","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":32,"sourcePage":5,"text":"排水固结预压法处理地基时,砂井的作用为（）。\nA.增加排水距离\nB.缩短排水距离 C.形成砂桩","answer":"B","id":"岩土工程-一-single-32","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":33,"sourcePage":5,"text":"在防渗墙检测的方法中,能有效检测水泥搅拌桩防渗墙间开叉、吊脚\n以及液压抓斗板墙每序之间的接缝等质量问题的方法是（\nC)。\nA.探地雷达方法\nB.弹性波 CT\nC.高密度电阻率法","answer":"C","id":"岩土工程-一-single-33","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":34,"sourcePage":5,"text":"岩石饱和吸水率是试件在（\n）下的最大吸水量与试件固体质量的\n比值。\nA.常温高压\nB.自然吸水\nC.强制饱和状态","answer":"C","id":"岩土工程-一-single-34","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":35,"sourcePage":5,"text":"黄土的湿陷性试验的目的是测定黄土(\nB）的关系,以计算有关黄\n土压缩性指标。\nA.轴向压缩变形和体积变形\nB.变形和压力\nC.渗透性和压力","answer":"B","id":"岩土工程-一-single-35","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":36,"sourcePage":5,"text":"土工织物的厚度一般是指在(\n_)压力下其顶面至底面间的垂直距\n离。\nA..10 kPa\nB.5 kPa\nC. 2 kPa","answer":"C","id":"岩土工程-一-single-36","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":37,"sourcePage":5,"text":"变水头渗透试验适用于（）\nA.砂砾石\nB.碎石土\nC.黏性土\nB)。","answer":"C","id":"岩土工程-一-single-37","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":38,"sourcePage":5,"text":"在渗流场中某点的渗透力（\nA.与水力坡降(水力梯度)成反比\nB.与水力坡降（水力梯度）成正比\nC.与水力坡降无关","answer":"B","id":"岩土工程-一-single-38","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":39,"sourcePage":6,"text":"以下关于用声波反射法检测单根锚杆检测信号时的注意事项说法正\nC)。\n确的是(\nA.单根锚杆检测的有效波形记录不应少于5个\nB.单根锚杆检测的有效波形应削峰\nC.不应失真和产生零漂","answer":"C","id":"岩土工程-一-single-39","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"single","number":40,"sourcePage":6,"text":"岩石耐崩解性试验适用于(\nC.新鲜岩石\nA.破碎及较破碎岩石\nB.风化岩石","answer":"B","id":"岩土工程-一-single-40","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":1,"sourcePage":6,"text":"土体原位测试的特点有\nA.受土体不均匀性影响,试验结果离散性一般较大\nB.可在明确、可控制的应力条件下进行试验\nC.排水条件不能很好控制\nD.可模拟各种应力条件进行试验","answer":"AC","id":"岩土工程-一-multi-01","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":2,"sourcePage":6,"text":"压水试验的压力计算零线的确定方法为(A BD\nA.当地下水位在试段以下时,压力计算零线为通过试段中点的水平线\nB.当地下水位在试段以内时,压力计算零线为通过地下水位以上试段\n中点的水平线\nC.当地下水位在试段以上时,压力计算零线为地下水位线\nD.以上全对","answer":"ABCD","id":"岩土工程-一-multi-02","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":3,"sourcePage":6,"text":"土的抗剪强度指标一般通过\n试验获得。\nA.三轴压缩\nB.直接剪切\nC.单向拉伸\nD.固结\nAb.","answer":"AB","id":"岩土工程-一-multi-03","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":4,"sourcePage":6,"text":"可作为反滤材料的主要土工合成材料产品有（\nA.无纺土工织物 B.有纺土工织物 C.土工格栅\nD.复合土工膜","answer":"AB","id":"岩土工程-一-multi-04","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":5,"sourcePage":6,"text":"分散性土通常有以下哪几种鉴定方法（\nA.针孔冲刷试验 B.渗透试验\nC.双比重计试验 D.碎块试验","answer":"ACD","id":"岩土工程-一-multi-05","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":6,"sourcePage":6,"text":"目前国内外应用最普遍、技术发展最成熟的地应力测量方法为\n(XS)。\nB.孔壁应变法\nA.钻孔套心应力解除法\nC.水压致裂法\nD.孔底应变法","answer":"AC","id":"岩土工程-一-multi-06","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":7,"sourcePage":7,"text":"除剪切流变试验外,在常规的岩石剪切试验中,大致分\nD施加剪\n切载荷。\nA.快速剪切法\nB.慢速剪切法\nC.时间控制法\nD.变形控制法\nA.换能器与测试岩体之间的耦合好坏\nB.测试系统的零延时值\nC.测试方法\nD.测试标准","answer":"ACD","id":"岩土工程-一-multi-07","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":8,"sourcePage":7,"text":"影响岩体波速测试的主要因素包括（）\nA.换能器与测试岩体之间的耦合好坏\nB.测试系统的零延时值\nC.测试方法\nD.测试标准","answer":"ABCD","id":"岩土工程-一-multi-08","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":9,"sourcePage":7,"text":"判断土的密实状态的指标有（）。\nA.最大干容重\nB.孔隙比\nC.饱和度\nD.相对实度","answer":"BD","id":"岩土工程-一-multi-09","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":10,"sourcePage":7,"text":"下列关于黏性土稠度的说法错误的是（（\nA.塑性指数表示土处于可塑状态的含水率的变化范围\nB.同一种土液性指数越大,含水率越高\nC.蝶式仪测试的是土的塑限值\nD.塑限是流动状态与可塑状态的界限含水率\n(Bd)。","answer":"CD","id":"岩土工程-一-multi-10","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":11,"sourcePage":7,"text":"以下关于土的渗透性描述正确的是(\nA.渗流速度为其实际流动速度\nB.水在土中的渗流速度与水力梯度成正比\nC.测定黏性土的渗透系数宜用常水头法\nD.渗流力的大小与水力梯度成正比","answer":"BD","id":"岩土工程-一-multi-11","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":12,"sourcePage":7,"text":"评价土的压缩性指标主要有(A B。D\nB.压缩指数\nC.泊松比\nA.压缩系数\nD.变形模量\nE.孔隙比","answer":"ABD","id":"岩土工程-一-multi-12","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":13,"sourcePage":7,"text":"三轴压缩试验测定的土的强度指标包括(\nBo.\nA.正应力\nB.内摩擦角\nC..黏聚力\nD.轴向应变","answer":"BC","id":"岩土工程-一-multi-13","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":14,"sourcePage":7,"text":"测量土的含水率的试验方法有（）。\nA.环刀法\nB.烘干法\nC.虹吸筒法\nD.酒精燃烧法\nAB\n15-现场测试土的密度的方法包括(\nA.环刀法\nB.灌砂法\nC.蜡封法\nD. 比重法\n(BUP","answer":"BD","id":"岩土工程-一-multi-14","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":16,"sourcePage":7,"text":"烘干法测试土的含水率,可能产生的误差包括(\nA.试样不饱和\nB.试样的代表性不够\nC.试样未达到恒重就从烘箱中取出\nD.试样称量不准","answer":"BCD","id":"岩土工程-一-multi-16","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":17,"sourcePage":7,"text":"轻型动力触探适用于（）填土。\nA.黏性素填土\nB.冲填土\nC.粗粒填土","answer":"AB","id":"岩土工程-一-multi-17","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":18,"sourcePage":7,"text":"单桩水平载荷试验能测定(\nA.桩身的完整性\nB.地基土的水平抗力系数\nC.单桩水平承载力","answer":"BC","id":"岩土工程-一-multi-18","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":19,"sourcePage":8,"text":"防渗墙质量检测方法有\nB：十字板试验\nC.探地雷达\nD.静力触探\nA.注水试验","answer":"ACD","id":"岩土工程-一-multi-19","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":20,"sourcePage":8,"text":"地基原位试验结果中需要进行杆长修正的是（A D\nD.动力触探\nA.标准贯入\nB.静力触探\nC.十字板试验\nA.饱和软黏土的不排水总强度\nB.饱和软黏土的灵敏度\nC.饱和软黏土的有效强度\nD.饱和软黏土的内摩擦角","answer":"AD","id":"岩土工程-一-multi-20","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":21,"sourcePage":8,"text":"十字板剪切试验可用于原位测定(\nA.和软黏土的不排水总强度\nB.饱和软黏土的灵敏度\nC.饱和软黏土的有效强度\nD.饱和软黏土的内摩擦角","answer":"AB","id":"岩土工程-一-multi-21","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":22,"sourcePage":8,"text":"三轴压缩试验的目的就是根据莫尔－库仑破坏准则测定土的强度参\n数( B .\nB.内摩擦角\nC.黏聚力\nA.压缩模量\nD.弹性模量","answer":"BC","id":"岩土工程-一-multi-22","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":23,"sourcePage":8,"text":"关于岩石单轴抗压强度试验说法正确的有（）\nA.试件含水状态可根据需要选择天然状态、烘干状态或饱和状态\nB.同一含水状态下每组试件数量不少于2个\nC.试验强度值随试件尺寸的增大而降低\nD.岩石饱和抗压强度与干抗压强度的比值称为岩石的软化系数,软化\n系数小于1","answer":"ACD","id":"岩土工程-一-multi-23","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":24,"sourcePage":8,"text":"静力载荷试验,试验终止的条件有（A\nA.承压板周边的土体出现明显侧向挤出\nB.本级荷载的沉降量急剧减小,P-s 曲线出现陡降段\nC. 在某级荷载下 24 h 沉降速率不能达到稳定标准\nD.总沉降量与承压板直径（或边长）之比超过0.06","answer":"ACD","id":"岩土工程-一-multi-24","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":25,"sourcePage":8,"text":"土体承受的现有压力小于等于先期固结压力时,土体可能为(\nC.欠固结土\nD.未固结土\nA.超固结土\nB.正常固结土\n（）。","answer":"AB","id":"岩土工程-一-multi-25","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":26,"sourcePage":8,"text":"现场铺设土工膜都需要将它们拼接成整体。拼接方法有(\nD.氧焊法\nA.电焊法\nB.粘接法\nC.热熔焊接法\n(BU)。","answer":"BC","id":"岩土工程-一-multi-26","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":27,"sourcePage":8,"text":"土工合成材料老化试验方法有\nA.红外灯照射试验\nB.自然气候暴露试验\nC.室内光源人工加速耐候试验\nD，白炽灯照射试验","answer":"BC","id":"岩土工程-一-multi-27","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":28,"sourcePage":8,"text":"宜采用电阻应变片法进行岩体单轴压缩变形试验的岩石有（）。\nA.坚硬岩石\nB.软岩\nC,较坚硬岩石\nD.极软岩\nABX","answer":"AC","id":"岩土工程-一-multi-28","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":29,"sourcePage":8,"text":"土的直接剪切试验可分为(\nA.快剪\nB.固结快剪\nC.慢剪\nD.固结排水剪\nA.设计要求的密实度\nB.单位夯击能\nC.夯击点的布置及间距\nD.夯击遍数","answer":"ABC","id":"岩土工程-一-multi-29","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":30,"sourcePage":9,"text":"强夯法主要施工参数包括（P\nA.设计要求的密实度\nB.单位夯击能\nC.夯击点的布置及间距\nD.夯击遍数","answer":"BCD","id":"岩土工程-一-multi-30","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":31,"sourcePage":9,"text":"地基中的应力包括（）\nA.自重应力\nB.基底压力\nC.附加应力\nD.土的侧向应力","answer":"AC","id":"岩土工程-一-multi-31","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":32,"sourcePage":9,"text":"地基的设计承载力应根据基础的下列（\nA项进行深宽修正。\nA.基础埋深\nB.基础长度\nC.基础宽度\nD.基础类型\n是地基的原位试验方法","answer":"AC","id":"岩土工程-一-multi-32","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":33,"sourcePage":9,"text":"下列方法(\nA.钻探\nB.载荷试验\nC.触探试验\nD.三轴压缩试验","answer":"BC","id":"岩土工程-一-multi-33","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":34,"sourcePage":9,"text":"以下(A是复合地基。\nA.灰土桩\nB.砂石桩\nC.深层搅拌桩\nD.预制混凝土桩\nE.钢桩","answer":"ABC","id":"岩土工程-一-multi-34","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":35,"sourcePage":9,"text":"钻孔灌注桩施工中泥浆的作用有(\nA.护壁\nB.增加地基承载力\nC.携带岩屑出地面\nD.加固地基\nE.润滑和冷却钻头","answer":"ACE","id":"岩土工程-一-multi-35","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":36,"sourcePage":9,"text":"土压力分为（）\nA.静止土压力\nB.朗肯土压力\nC.库仑土压力\nD.主动土压力\nE.被动土压力","answer":"ABD","id":"岩土工程-一-multi-36","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":37,"sourcePage":9,"text":"场地的地震效应主要表现在下列（AC方面。\nA.共振作用\nB.振密作用\nC.放大作用\nD.地基的失稳与不均匀沉降","answer":"ACD","id":"岩土工程-一-multi-37","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":38,"sourcePage":9,"text":"填土包括以下（）种。\nA.素填土\nB.杂填土\nC. 冲(吹)填土\nD.人工填土\nE.机械填土","answer":"ABC","id":"岩土工程-一-multi-38","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":39,"sourcePage":9,"text":"三轴压缩试验可分为（\nA.固结快剪\nB.不固结不排水剪\nC.固结不排水剪\nD.固结排水剪","answer":"BCD","id":"岩土工程-一-multi-39","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"一","type":"multi","number":40,"sourcePage":9,"text":"《土的分类标准》（GBJ145—90)把粗粒土分为（）：\nA.砾类土\nB.砂类土\nC. 亚砂土\nD.粉土","answer":"AB","id":"岩土工程-一-multi-40","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"二","type":"judge","number":1,"sourcePage":10,"text":"岩石含水率试验的烘干标准,根据目前国内外有关规程有时间控制和\n称量控制两种","answer":"T","id":"岩土工程-二-judge-01","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":2,"sourcePage":10,"text":"岩石饱水系数是指岩石自然吸水率与饱水系数的比值,以百分数表示。","answer":"F","id":"岩土工程-二-judge-02","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":3,"sourcePage":10,"text":"岩石颗粒密度是岩石的质量与体积的比值。","answer":"F","id":"岩土工程-二-judge-03","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":4,"sourcePage":10,"text":"通常的岩体变形试验的变形稳定标准有如下三种标准：以一定时间内\n变形的绝对变化值为标准,以一定时间内变形的相对变化值为标准，以\n时间作为变形稳定标准。","answer":"T","id":"岩土工程-二-judge-04","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":5,"sourcePage":10,"text":"常用的岩石强度理论主要有库仑强度准则、莫尔强度准则和格里菲斯\n强度理论。","answer":"T","id":"岩土工程-二-judge-05","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":6,"sourcePage":10,"text":"对于浅层岩体地应力,平均水平应力与铅垂应力的比值随深度而变化","answer":"T","id":"岩土工程-二-judge-06","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":7,"sourcePage":10,"text":"岩体表面应力测试法主要包括表面应力解除法和表面应变恢复法。","answer":"F","id":"岩土工程-二-judge-07","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":8,"sourcePage":10,"text":"岩体应变观测中,观测点布置时应变计可以跨越结构面。","answer":"F","id":"岩土工程-二-judge-08","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":9,"sourcePage":10,"text":"室内土工试验主要分为土的物理性试验、土的力学性试验和土的化学\n性试验。","answer":"T","id":"岩土工程-二-judge-09","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":10,"sourcePage":10,"text":"除土的粒径分布曲线外,土体的各种物理性质指标中,有五个是独立\n的。","answer":"F","id":"岩土工程-二-judge-10","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":11,"sourcePage":10,"text":"黏性土在工程上常用的界限含水率有液限、塑限、固限。","answer":"F","id":"岩土工程-二-judge-11","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":12,"sourcePage":10,"text":"相对密实度小于0.3的土属于密实性土。","answer":"F","id":"岩土工程-二-judge-12","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":13,"sourcePage":10,"text":"黏性土的渗透系数一般采用常水头法进行测定。","answer":"F","id":"岩土工程-二-judge-13","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":14,"sourcePage":10,"text":"高压缩性土的压缩指数一般大于0.4,低压缩性土的压缩指数一般小\n于0.2。","answer":"T","id":"岩土工程-二-judge-14","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":15,"sourcePage":10,"text":"黏聚力和内摩擦角是土体的抗剪强度指标,黏性土的黏聚力一般较砂\n性土大。","answer":"T","id":"岩土工程-二-judge-15","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":16,"sourcePage":11,"text":"土体直接剪切试验按排水条件和加荷速率可以分为快剪、固结快剪、\n慢剪和固结慢剪四种。","answer":"F","id":"岩土工程-二-judge-16","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":17,"sourcePage":11,"text":"黏性土的颗粒分析试验通常使用筛分法。","answer":"F","id":"岩土工程-二-judge-17","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":18,"sourcePage":11,"text":"当黄土湿陷性系数小于0.015 时,应定为非湿陷性黄土6","answer":"T","id":"岩土工程-二-judge-18","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":19,"sourcePage":11,"text":"地基土的破坏形式一般分为整体剪切破坏、局部剪切破坏、冲剪破\n坏。","answer":"T","id":"岩土工程-二-judge-19","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":20,"sourcePage":11,"text":"地基土体初始应力状态和应力历史参数可以通过原位测试获得。","answer":"T","id":"岩土工程-二-judge-20","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":21,"sourcePage":11,"text":"标准贯人试验设备主要由贯人器、触探杆、穿心锤三部分组成","answer":"T","id":"岩土工程-二-judge-21","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":22,"sourcePage":11,"text":"土工膜焊缝质量检验包括三方面的内容：目测、焊缝检漏、抽样检查","answer":"T","id":"岩土工程-二-judge-22","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":23,"sourcePage":11,"text":"根据桩身材料特性,桩可以分为摩擦桩和端承桩。","answer":"F","id":"岩土工程-二-judge-23","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":24,"sourcePage":11,"text":"基桩检测时,检测结果评价要求完整性检测与承载力检测相互配合，\n多种检测方法相互验证与补充。","answer":"T","id":"岩土工程-二-judge-24","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":25,"sourcePage":11,"text":"混凝土强度评定方法有三种:方差已知的统计方法、方差未知的统计\n方法、非统计评定方法。","answer":"T","id":"岩土工程-二-judge-25","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":26,"sourcePage":11,"text":"静载试验桩的破坏模式,主要包括桩身结构强度破坏和桩身结构稳定\n性破坏。","answer":"F","id":"岩土工程-二-judge-26","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":27,"sourcePage":11,"text":"高喷注浆法具有适应范围广、施工简便、耐久性强、浆液集中、流失较\n少等特点。","answer":"T","id":"岩土工程-二-judge-27","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":28,"sourcePage":11,"text":"按照受力方法,锚杆可以分为拉力型锚杆和压力型锚杆。","answer":"T","id":"岩土工程-二-judge-28","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":29,"sourcePage":11,"text":"锚杆锚固段注浆施加结束后即可进行锚杆拉拔试验，","answer":"F","id":"岩土工程-二-judge-29","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"judge","number":30,"sourcePage":11,"text":"锚杆锚固质量无损检测内容包括锚杆杆体长度检测和锚固密实度检\n测。","answer":"T","id":"岩土工程-二-judge-30","typeLabel":"判断题"},{"subject":"岩土工程","set":"二","type":"single","number":1,"sourcePage":11,"text":"普通岩石含水率试验的烘干温度可以为(\n（）。\nA.106 ℃\nB.100 ℃\nC. 66 ℃\nD.70 ℃","answer":"A","id":"岩土工程-二-single-01","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":2,"sourcePage":11,"text":"不规则膨胀岩的块体密度测量可以用（）。\nA.量积法\nB.水中称量法\nC.密封法\nD.以上都可以","answer":"C","id":"岩土工程-二-single-02","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":3,"sourcePage":11,"text":"岩体结构面抗剪强度参数主要采用（)方法获得。\nA.单轴压缩试验\nB.结构面直剪试验\nC.三轴压缩试验\nD.直接剪切试验","answer":"B","id":"岩土工程-二-single-03","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":4,"sourcePage":12,"text":"规程中岩体现场载荷试验承压板法面积为（\nA. 100 ~ 200 cm\nB. 200 ~ 500 cm\nC. 500 ~ 1 000 cm\nD. 2 000 cm²","answer":"C","id":"岩土工程-二-single-04","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":5,"sourcePage":12,"text":"对于孔底应变法测试中应变计的安装,规定检查系统的绝缘值不应小\n于(\nA. 20\nB. 30\nC. 40\nD.50\n)时岩石可以看做无限介质，\nA.边界尺寸大于 10 倍波长\nB.边界尺寸大于3倍波长\nC.边界尺寸在5～10 倍波长之间\nD.边界尺寸小于5 倍波长","answer":"D","id":"岩土工程-二-single-05","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":6,"sourcePage":12,"text":"岩石声波测试中,当（）时岩石可以看做无限介质。\nA.边界尺寸大于10倍波长\nB.边界尺寸大于3倍波长\nC.边界尺寸在5～10倍波长之间\nD.边界尺寸小于5倍波长","answer":"A","id":"岩土工程-二-single-06","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":7,"sourcePage":12,"text":"天然岩体自重应力（）。\nA.随深度增加而增加\nB.与构造应力有关\nC.等于岩体初始应力\nD.不确定\nB )。","answer":"A","id":"岩土工程-二-single-07","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":8,"sourcePage":12,"text":"岩石点荷载强度试验试样尺寸的参考直径是(\nB.50 mm\nC.7 cm\nD.10 cm\nA.30 mm","answer":"B","id":"岩土工程-二-single-08","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":9,"sourcePage":12,"text":"土的三项基本可以直接量测的物理指标是（）。\nA.孔隙比、天然含水量和饱和度\nB.孔隙率、相对密度和密度\nC.天然重度、天然含水量和相对密度 D.饱和度、密度、含水率","answer":"C","id":"岩土工程-二-single-09","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":10,"sourcePage":12,"text":"岩石遭风化剥蚀后残留在原地而未被搬运的土层称为（）\nA.风积土\nB.坡积土\nC.残积土\nD.运积土","answer":"C","id":"岩土工程-二-single-10","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":11,"sourcePage":12,"text":"膨胀土中,引起土体胀缩最主要的成分是(\nD.高岭石\nA.长石\nB.伊利石\nC.蒙脱石","answer":"C","id":"岩土工程-二-single-11","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":12,"sourcePage":12,"text":"饱和土体的固结过程应该是(\nA.孔隙水压力不断增加的过程\nB.有效应力的增加而孔隙水压力减小的过程\nC.有效应力不断减小的过程\nD.有效应力的减小而孔隙水压力增加的过程","answer":"C","id":"岩土工程-二-single-12","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":13,"sourcePage":12,"text":"在工程中,利用侧限压缩试验确定该土为中等压缩性土,则该土的压\n缩系数为（’\nA. α1-2 <0. 1 MPa-1\nB.0.1 MPa-1 <α1-2 <0.5 MPa-1\nC.0.5 MPa-1 <α1-2 <0.8 MPa-1\nD.α1-2 >0.8 MPa-1","answer":"B","id":"岩土工程-二-single-13","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":14,"sourcePage":13,"text":"饱和黏土地层的固结应力与前期固结应力(\nA.都是总应力\nB.都是有效应力\nC.不能确定前期固结应力是否全转化为有效应力\nD.不能确定固结应力是否全转化为有效应力\nA.地基中水的排出\nB.地基中气体的压缩\nC.地基中土颗粒的压缩\nD.地基中水的压缩","answer":"D","id":"岩土工程-二-single-14","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":15,"sourcePage":13,"text":"在荷载作用下,引起饱和地基土固结沉降的主要因素是（）。\nA.地基中水的排出\nB.地基中气体的压缩\nC.地基中土颗粒的压缩\nD.地基中水的压缩","answer":"A","id":"岩土工程-二-single-15","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":16,"sourcePage":13,"text":"正常固结黏土,进行三轴试验时(\nB. C.u <Cd\nA. Ccu >Cd\nD.随土样的分类与性质不同而不同","answer":"C","id":"岩土工程-二-single-16","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":17,"sourcePage":13,"text":"下列哪种试验在试验过程中可以测量孔隙水应力(\nA.直接剪切试验\nB. 三轴试验\nC.无侧限抗压强度试验\nD.十字板试验","answer":"B","id":"岩土工程-二-single-17","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":18,"sourcePage":13,"text":"紧砂与强超固结土在三轴仪上进行排水剪试验,孔隙水应力（\nD)\nA.不确定\nB.在剪破的时候为负值\nC.在剪破的时候为正值\nD.在剪破的时候为 0","answer":"D","id":"岩土工程-二-single-18","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":19,"sourcePage":13,"text":"对同一建筑物的基础和地基,临塑荷载Pcr、设计承载力 PV4、极限荷载\nPu三者之间的大小关系为（）。\nA. Pcr >P1/4 >Pu\nB.P1/4 >Pc >Pu\nC. Pcr >Pu >P1/4\nD.Pu >P1/4 >Per\nC )。","answer":"D","id":"岩土工程-二-single-19","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":20,"sourcePage":13,"text":"在土质堤坝施工期的稳定安全问题分析中,应选择\nA.固结排水强度指标\nB.固结不排水强度指标\nC.不固结不排水强度指标\nD.不固结排水强度指标","answer":"C","id":"岩土工程-二-single-20","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":21,"sourcePage":13,"text":"计算地基承载力时,对地下水位以下的土层,土的重度应选用\nA.饱和重度\nB.天然重度\nC.浮重度\nD.平均重度\nB)。","answer":"C","id":"岩土工程-二-single-21","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":22,"sourcePage":13,"text":"土工合成材料的功能很多,归纳为七种,其中有(\nA.防腐功能\nB.加筋功能\nC.清洁功能\nD.防火功能\nA.土工织物\nB.土工膜\nC.土工格栅\nD.土工格室","answer":"B","id":"岩土工程-二-single-22","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":23,"sourcePage":13,"text":"土工合成材料具有防渗功能,下列材料中用于防渗的材料是（）。\nA.土工织物\nB.土工膜\nC.土工格栅\nD.土工格室","answer":"B","id":"岩土工程-二-single-23","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":24,"sourcePage":13,"text":"土工合成材料厚度测试压力为（\n（）。\nA. 1 kPa\nB.2 kPa\nC.5 kPa\nD. 10 kPa","answer":"B","id":"岩土工程-二-single-24","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":25,"sourcePage":13,"text":"饱和软黏土地基可以用(\n)方法处理。\nA.碾压\nB.振密\nC.夯实\nD.排水固结","answer":"D","id":"岩土工程-二-single-25","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":26,"sourcePage":14,"text":"桩身完整性分类为 I 类的是(\nB.桩身轻微缺陷\nA.桩身完整\nD.桩身明显缺陷\nC.桩身严重缺陷\nC.钻芯法\nD.低应变法\nA.静载荷试验\nB.抗拔试验","answer":"A","id":"岩土工程-二-single-26","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"二","type":"single","number":27,"sourcePage":14
