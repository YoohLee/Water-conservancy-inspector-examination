function persist(){localStorage.setItem(STORE,JSON.stringify(saved))}
function normAnswer(v){return [...new Set(String(v||'').toUpperCase().replace(/[^A-EFT]/g,''))].sort().join('')}
function setupFilters(){const subjects=[...new Set(QUESTIONS.map(q=>q.subject))];fill(subjectFilter,[['all',label.all],...subjects.map(x=>[x,x])]);fill(setFilter,[['all',label.all],['?','\u4e00'],['?','\u4e8c'],['?','\u4e09']]);fill(typeFilter,[['all',label.all],['judge',label.judge],['single',label.single],['multi',label.multi]]);subtitle.textContent=`${QUESTIONS.length} \u9053\u9898`}
function fill(el,items){el.innerHTML=items.map(([v,t])=>`<option value="${v}">${t}</option>`).join('')}
function filtered(){let arr=QUESTIONS.filter(q=>(state.subject==='all'||q.subject===state.subject)&&(state.set==='all'||q.set===state.set)&&(state.type==='all'||q.type===state.type));if(state.search.trim()){const kw=state.search.trim().toLowerCase();arr=arr.filter(q=>(q.text+q.subject+q.typeLabel).toLowerCase().includes(kw))}if(state.mode==='wrong')arr=arr.filter(q=>saved.results[q.id]&&saved.results[q.id].correct===false);return arr}
function rebuildOrder(){let arr=filtered();state.order=arr.map(q=>q.id);if(state.mode==='random')shuffle(state.order);state.index=Math.min(state.index,Math.max(0,state.order.length-1));state.revealed=false;render()}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function currentList(){const map=new Map(QUESTIONS.map(q=>[q.id,q]));return state.order.map(id=>map.get(id)).filter(Boolean)}
function current(){return currentList()[state.index]}
function optionLetters(q){if(q.type==='judge')return ['T','F'];const found=new Set((q.text.match(/[A-E][\.??:?]/g)||[]).map(x=>x[0]));for(const ch of q.answer||'')found.add(ch);const max=found.has('E')?'E':'D';return ['A','B','C','D','E'].filter(ch=>ch<=max)}
function render(){const list=currentList();renderStats(list);renderGrid(list);const q=current();submitBtn.disabled=!q;revealBtn.disabled=!q;prevBtn.disabled=state.index<=0;nextBtn.disabled=state.index>=list.length-1;if(!q){questionCard.innerHTML='<div class="empty">\u6ca1\u6709\u5339\u914d\u7684\u9898\u76ee</div>';return}const res=saved.results[q.id];const meta=`<div class="meta"><span class="badge strong">${q.subject}</span><span class="badge">${q.set}</span><span class="badge">${q.typeLabel}</span><span class="badge">${q.number}</span></div>`;questionCard.innerHTML=`${meta}<h2 class="question-title">${q.typeLabel} ${q.number}</h2><div class="question-text"></div><div class="answer-area"><div class="choices ${q.type==='judge'?'judge':''}" id="choices"></div><div class="small" id="selectedText"></div><div class="result" id="resultBox"></div></div>`;questionCard.querySelector('.question-text').textContent=q.text;renderChoices(q,res);renderResult(q,res)}
function renderChoices(q,res){const wrap=document.getElementById('choices');const selected=new Set((res?res.choice:'').split('').filter(Boolean));wrap.innerHTML='';for(const letter of optionLetters(q)){const b=document.createElement('button');b.className='choice-btn';b.dataset.value=letter;b.textContent=q.type==='judge'?(letter==='T'?'\u6b63\u786e':'\u9519\u8bef'):letter;if(selected.has(letter))b.classList.add('selected');b.onclick=()=>toggleChoice(q,b);wrap.appendChild(b)}updateSelected()}
function toggleChoice(q,b){if(saved.results[q.id]&&saved.results[q.id].locked)return;const val=b.dataset.value;if(q.type==='multi'){b.classList.toggle('selected')}else{document.querySelectorAll('.choice-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected')}updateSelected()}
function selectedValue(){return normAnswer([...document.querySelectorAll('.choice-btn.selected')].map(b=>b.dataset.value).join(''))}
function updateSelected(){const el=document.getElementById('selectedText');if(!el)return;const v=selectedValue();el.textContent=v?`\u5df2\u9009\uff1a${v.replace('T','\u6b63\u786e').replace('F','\u9519\u8bef')}`:'\u672a\u9009';}
function submit(){const q=current();if(!q)return;const choice=selectedValue();if(!choice)return;const correct=choice===normAnswer(q.answer);saved.results[q.id]={choice,correct,locked:true};persist();state.revealed=true;render()}
function reveal(){const q=current();if(!q)return;state.revealed=true;renderResult(q,saved.results[q.id])}
function renderResult(q,res){const box=document.getElementById('resultBox');if(!box)return;const show=state.revealed||res;if(!show){box.className='result';box.textContent='';return}const answer=q.type==='judge'?(q.answer==='T'?'\u6b63\u786e':'\u9519\u8bef'):q.answer;let cls='neutral',text=`\u6807\u51c6\u7b54\u6848\uff1a${answer}`;if(res){cls=res.correct?'good':'bad';text=`${res.correct?'\u56de\u7b54\u6b63\u786e':'\u56de\u7b54\u9519\u8bef'}\n\u4f60\u7684\u7b54\u6848\uff1a${res.choice}\n\u6807\u51c6\u7b54\u6848\uff1a${answer}`}box.className=`result show ${cls}`;box.textContent=text}
function renderStats(list){const total=list.length;const done=list.filter(q=>saved.results[q.id]).length;const ok=list.filter(q=>saved.results[q.id]?.correct).length;statTotal.textContent=total;statDone.textContent=done;statRate.textContent=done?Math.round(ok/done*100)+'%':'0%';progressFill.style.width=total?`${done/total*100}%`:'0%'}
function renderGrid(list){questionGrid.innerHTML='';list.forEach((q,i)=>{const b=document.createElement('button');b.className='qdot';if(i===state.index)b.classList.add('current');const r=saved.results[q.id];if(r)b.classList.add(r.correct?'ok':'no');b.textContent=q.number;b.onclick=()=>{state.index=i;state.revealed=false;render()};questionGrid.appendChild(b)})}
function bind(){subjectFilter.onchange=e=>{state.subject=e.target.value;state.index=0;rebuildOrder()};setFilter.onchange=e=>{state.set=e.target.value;state.index=0;rebuildOrder()};typeFilter.onchange=e=>{state.type=e.target.value;state.index=0;rebuildOrder()};searchInput.oninput=e=>{state.search=e.target.value;state.index=0;rebuildOrder()};orderedMode.onclick=()=>setMode('ordered');randomMode.onclick=()=>setMode('random');wrongMode.onclick=()=>setMode(state.mode==='wrong'?'ordered':'wrong');resetBtn.onclick=()=>{if(confirm('\u786e\u5b9a\u6e05\u7a7a\u7b54\u9898\u8bb0\u5f55\uff1f')){saved={results:{}};persist();render()}};prevBtn.onclick=()=>{state.index=Math.max(0,state.index-1);state.revealed=false;render()};nextBtn.onclick=()=>{state.index=Math.min(currentList().length-1,state.index+1);state.revealed=false;render()};submitBtn.onclick=submit;revealBtn.onclick=reveal}
function setMode(m){state.mode=m;orderedMode.classList.toggle('active',m==='ordered');randomMode.classList.toggle('active',m==='random');wrongMode.classList.toggle('primary',m==='wrong');state.index=0;rebuildOrder()}
setupFilters();bind();rebuildOrder();
</script>
</body>
</html>
