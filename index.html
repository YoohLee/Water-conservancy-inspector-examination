岩土工程","set":"三","type":"judge","number":3,"sourcePage":20,"text":"材料的吸水性用含水率来表示,","answer":"F","id":"岩土工程-三-judge-03","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":4,"sourcePage":20,"text":"气硬性胶凝材料,既能在空气中硬化又能在水中硬化","answer":"F","id":"岩土工程-三-judge-04","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":5,"sourcePage":20,"text":"有抗渗性要求的混凝土不宜选用矿渣硅酸盐水泥","answer":"T","id":"岩土工程-三-judge-05","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":6,"sourcePage":20,"text":"相对湿度越大,混凝土碳化的速度就越快","answer":"F","id":"岩土工程-三-judge-06","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":7,"sourcePage":20,"text":"石料的孔隙率是石料的孔隙体积占其试样总体积的百分率。","answer":"F","id":"岩土工程-三-judge-07","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":8,"sourcePage":20,"text":"石料的软化系数越小,耐水性能越好。","answer":"F","id":"岩土工程-三-judge-08","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":9,"sourcePage":20,"text":"细度模数越大,表示细集料越粗。","answer":"T","id":"岩土工程-三-judge-09","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":10,"sourcePage":20,"text":"气硬性胶凝材料只能在空气中硬化,而水硬性胶凝材料只能在水中硬\n化。","answer":"F","id":"岩土工程-三-judge-10","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":11,"sourcePage":20,"text":"石膏浆体的凝结硬化实际上是碳化作用。","answer":"F","id":"岩土工程-三-judge-11","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":12,"sourcePage":20,"text":"用沸煮法可以全面检验硅酸盐水泥的体积安定性是否良好。（）","answer":"F","id":"岩土工程-三-judge-12","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":13,"sourcePage":20,"text":"在粒化高炉矿渣中加入少量石膏共同磨细,即可制得矿渣硅酸盐水\n泥。","answer":"F","id":"岩土工程-三-judge-13","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":14,"sourcePage":20,"text":"试拌混凝土时若测定混凝土的落度满足要求,则混凝土的工作性良\n好。","answer":"F","id":"岩土工程-三-judge-14","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":15,"sourcePage":20,"text":"在进行防渗墙质量检测方法中,探地雷达法、可控源音频大地电磁法\n瑞雷波法、浅层地震法等均属于无损检测的方法。","answer":"T","id":"岩土工程-三-judge-15","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":16,"sourcePage":20,"text":"混凝土的强度平均值和标准差,都是说明混凝土质量的离散程度的。","answer":"F","id":"岩土工程-三-judge-16","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":17,"sourcePage":21,"text":"在混凝土施工中,统计得出混凝土强度标准差越大,则表明混凝土生\n产质量不稳定,施工水平越差。","answer":"T","id":"岩土工程-三-judge-17","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":18,"sourcePage":21,"text":"高性能混凝土就是指高强度的混凝土。","answer":"T","id":"岩土工程-三-judge-18","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":19,"sourcePage":21,"text":"砂浆的流动性是用分层度表示的。","answer":"T","id":"岩土工程-三-judge-19","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":20,"sourcePage":21,"text":"碱性石料与石油沥青的黏附性较酸性石料与石油沥青的黏附性好","answer":"T","id":"岩土工程-三-judge-20","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":21,"sourcePage":21,"text":"沥青混合料是一种复合材料，由沥青、粗集料、细集料和矿粉以及外加\n剂所组成。","answer":"T","id":"岩土工程-三-judge-21","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":22,"sourcePage":21,"text":"CFG桩在受力特性方面介于碎石桩和钢筋混凝土桩之间。","answer":"T","id":"岩土工程-三-judge-22","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":23,"sourcePage":21,"text":"沥青混合料主要技术性质为:高温稳定性、低温抗裂性、耐久性、抗滑\n性和施工和易性","answer":"T","id":"岩土工程-三-judge-23","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":24,"sourcePage":21,"text":"高分子化合物按其链节在空间排列的几何形状,可分为线型聚合物和\n体型聚合物两类。","answer":"T","id":"岩土工程-三-judge-24","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":25,"sourcePage":21,"text":"抗拉强度是钢材开始丧失对变形的抵抗能力时所承受的最大拉应力。","answer":"F","id":"岩土工程-三-judge-25","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":26,"sourcePage":21,"text":"锰对钢的性能产生一系列不良的影响,是一种有害元素。","answer":"F","id":"岩土工程-三-judge-26","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":27,"sourcePage":21,"text":"木材的持久强度等于其极限强度。","answer":"F","id":"岩土工程-三-judge-27","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":28,"sourcePage":21,"text":"木材平衡含水率随空气温度和相对湿度的变化而变化","answer":"T","id":"岩土工程-三-judge-28","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":29,"sourcePage":21,"text":"塑料排水板带土工合成材料不适用于土体的加筋","answer":"T","id":"岩土工程-三-judge-29","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"judge","number":30,"sourcePage":21,"text":"混合岩属于深变质岩岩类。","answer":"T","id":"岩土工程-三-judge-30","typeLabel":"判断题"},{"subject":"岩土工程","set":"三","type":"single","number":1,"sourcePage":21,"text":"石坝坝基加固处理不宜采用下列(\n)项措施。\nA.固结灌浆与锚固\nB.建立防渗惟幕或防渗墙\nC.建立排水幕\nD.坝身采用黏土心墙防渗","answer":"D","id":"岩土工程-三-single-01","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":2,"sourcePage":21,"text":"有一墙背直立的重力式挡土墙,墙后填土由上下两层土组成,、c、Φ分\n别表示土的重度,内聚力及内摩擦角,如果 Ci ～0,C² >0,问只有在下列\n能从上而下为一条连续的直线。\nA. 1 >2,1 >(P2\nB. 1 >2,1 <P2\nC. 1 <2,P1 ≥P2\nD. 1 <2,P1 <P2","answer":"A","id":"岩土工程-三-single-02","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":3,"sourcePage":21,"text":"采用预应力锚索时，下列选项中（)项是不正确的。\nA.预应力锚索由锚固段、自由段及紧固头三部分组成\nB.锚索与水平面的夹角以下倾15°～30°为宜\nC.预应力锚索只能适用于岩质地层的边坡及地基加固\nD.锚索必须作好防锈防腐处理","answer":"C","id":"岩土工程-三-single-03","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":4,"sourcePage":22,"text":"岩土种类多,很不均匀,性质变化大,需特殊处理;严重湿陷、膨胀、盐\n渍、污染的特殊性岩土，以及其他情况复杂,需作专门处理的岩土属于\nA.四级地基\nB.三级地基\nD.一级地基\nC.二级地基","answer":"D","id":"岩土工程-三-single-04","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":5,"sourcePage":22,"text":"材料的抗冻性的优劣（）。\nA.仅与孔隙率有关\nB.仅与强度有关\nC.与孔结构、强度、水饱和程度有关D.与孔结构无关","answer":"C","id":"岩土工程-三-single-05","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":6,"sourcePage":22,"text":"各硅酸盐水泥熟料反应速度的特点是:硅酸三钙（\n）），铝酸三钙\n）,硅酸二钙(\nB.最慢 中等 最快\nA.最快 最慢 中等\nD.中等 最快 最慢\nC.中等 最慢 最快","answer":"D","id":"岩土工程-三-single-06","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":7,"sourcePage":22,"text":"当完整性指数大于（）时,为完整岩体。\nA.0.75\nB.0.65\nC..0. 55\nD.0.45","answer":"A","id":"岩土工程-三-single-07","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":8,"sourcePage":22,"text":"（）)为岩体压缩波速与岩块压缩波速之比的平方,选定岩体和岩块\n测定波速时,应注意其代表性。\nA.饱和单轴\nB.抗压强度\nC.完整性指数\nD.抗拉指数","answer":"C","id":"岩土工程-三-single-08","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":9,"sourcePage":22,"text":"粒径大于 2 mm 的颗粒质量超过总质量 50%的土,应定名为（）。\nA.砂土\nB.碎石土\nC.粉土\nD.黏性土","answer":"B","id":"岩土工程-三-single-09","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":10,"sourcePage":22,"text":"粒径大于0.075 mm 的颗粒质量不超过总质量的50%,且塑性指数等\n于或小于(\n)的土,应定名为粉土。\nB. 13\nA. 10\nC. 15\nD.17\n)有很大影响。","answer":"A","id":"岩土工程-三-single-10","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":11,"sourcePage":22,"text":"土粒的排列对于土的(\nB.临界强度\nC.均匀性\nA.内摩擦角\nD.塑限、液限","answer":"C","id":"岩土工程-三-single-11","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":12,"sourcePage":22,"text":"矩形基础底面尺寸为 l=3 m、b =2 m,受偏心荷载作用,当偏心距 e =\n0.3m 时,其基底压力分布图形为（）。\nA.一个三角形\nB.矩形\nC.梯形\nD.两个三角形","answer":"C","id":"岩土工程-三-single-12","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":13,"sourcePage":22,"text":"箱形基础的埋置深度5 m,原始地下水位在地面以下0.5 m.处,作用\n在基础底面的总压力为 P,如地下水位下降3 m,基础底面平均附加压力的变\n)值。\n化量将为下列(\nA. - 30 kPa\nB.0\nC. +30 kPa\nD. +45 kPa","answer":"B","id":"岩土工程-三-single-13","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":14,"sourcePage":23,"text":"单向偏心荷载作用下的矩形基础。基底压力分布形状与偏心距e 的\n条件时,基底压力为梯形。\nB. e = L/6\nA. e <L/6\nC. é>L/6\nD. e=0","answer":"A","id":"岩土工程-三-single-14","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":15,"sourcePage":23,"text":"在较厚的软土地基上建造多层或高层建筑物时,因软土地基的强度\n低、压缩性高,地基基础设计可考虑采用补偿基础设计。补偿性基础设计的主\n要目的是（\nA.减少基底压力\nB.减少基底平均附加应力\nC.减少基底处土的自重应力\nD.增加基底处土的自重应力","answer":"B","id":"岩土工程-三-single-15","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":16,"sourcePage":23,"text":"孔隙比是由（）确定的。\nA.室内试验\nB.野外试验\nC.换算\nD.经验判别","answer":"C","id":"岩土工程-三-single-16","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":17,"sourcePage":23,"text":"独立高箕水塔基础采用正方形基础,基底平均压力值为P,偏心距 e\n控制值为e=b/12（b为基础底面宽度）,验算偏心荷载作用下基底压力时，下\nB）选项是正确的。\nA. Pmax = 1.4P\nB. P.\n=1.5P\nmax\nC. Pmax = 1. 6P\nD. Pmax =2P\nPmin =0\nP.","answer":"B","id":"岩土工程-三-single-17","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":18,"sourcePage":23,"text":"在相同稠度等级的沥青中,沥青质含量增加,使沥青的高温稳定性得\n）,但低温抗裂性也相应（）。\nA.提高\n提高\nB.降低\n降低　C.提高\n降低\nD.降低\n提高","answer":"C","id":"岩土工程-三-single-18","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":19,"sourcePage":23,"text":"在土的压缩曲线上,对应于横坐标上的压力荷载指的是(\nA.土层的自重应力\nB.土层的附加应力\nC.土层的孔隙水压力\nD.土层中的有效应力","answer":"D","id":"岩土工程-三-single-19","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":20,"sourcePage":23,"text":"对于碾压土坝中的黏性土,在施工期采用总应力法进行稳定分析时,\n应采用下列（)试验确定土的强度指标。\nA.三轴固结排水剪试验\nB.直剪试验中的慢剪试验\nC.三轴固结不排水试验\nD.三轴不固结不排水试验","answer":"D","id":"岩土工程-三-single-20","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":21,"sourcePage":23,"text":"在沥青的三种胶体结构中，（U\n)具有较好的自愈性和低温时变形\n能力,但温度感应性较差。\nA.凝胶型结构\nB.溶-凝胶型结构\nC.溶胶型结构\nD.固胶型结构","answer":"C","id":"岩土工程-三-single-21","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":22,"sourcePage":23,"text":"下列（\n/选项不宜采用立管式孔隙水压力计。\nA.观测弱透水层的稳定水位\nB.观测排水固结处理地基时的孔隙水压力\nC.观测强夯法处理地基时的孔隙水压力\nD.作为观测孔观测抽水试验的水位下降","answer":"C","id":"岩土工程-三-single-22","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":23,"sourcePage":24,"text":"在其他条件相同时,悬壁式钢板桩和悬壁璧式混凝土地下连续墙所受基\n)种情况。\n坑外侧土压力的实测结果应该是下列(\nA.由于混凝土模量比钢材小,所以混凝土墙上的土压力更大\nB.由于混凝土墙上的变形小（位移）,所以混凝土墙上的土压力更大\nC.由于钢板桩的变形（位移)大,所以钢板桩上的土压力大\nD.由于钢材强度高于混凝土强度,所以钢板桩上的土压力更大","answer":"B","id":"岩土工程-三-single-23","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":24,"sourcePage":24,"text":"关于地基土中土工合成材料加筋层的机理,下列(\n)种说法是错\n误的。\nA.扩散应力\nB.调整地基不均匀变形\nC.增加地基稳定性\nD.提高土的排水渗透能力","answer":"A","id":"岩土工程-三-single-24","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":25,"sourcePage":24,"text":"在卵石层上的新填砂土上灌水,稳定下渗,地下水位较深,下列\n选项是有可能产生的后果。\nA.降低砂土的有效应力\nB.增加砂土的自重应力\nC.增加砂土的基质吸力\nD.产生管涌","answer":"B","id":"岩土工程-三-single-25","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":26,"sourcePage":24,"text":"某工程地基为高压缩性软土层,为了预测建筑物的沉降历时关系,该\n工程的勘察报告中除常规岩土参数外还必须提供下列（)岩土参数。\nA. 体积压缩系数 m\nB.压缩指数 C。\nC. 固结系数 C,\nD.回弹指数 C。","answer":"C","id":"岩土工程-三-single-26","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":27,"sourcePage":24,"text":"将土体视为弹性介质,采用m法计算桩的水平承载力和位移时,其水\n)种情况。\nA.不随深度而变\nB.随深度线性增大\nD.随深度非线性变化\nC.随深度线性减小","answer":"B","id":"岩土工程-三-single-27","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":28,"sourcePage":24,"text":"使地基土产生冻胀的水是（）。\nA.强结合水\nB.弱结合水\nC.毛细水\nD.重力水","answer":"C","id":"岩土工程-三-single-28","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":29,"sourcePage":24,"text":"某宿舍楼采用墙下 C15 混凝土条形基础,基础顶面的墙体宽度 0.38\nm,基底平均压力为 250 kPa,基础底面宽度为 1.5 m,基础的最小高度应符合\n下列（（）选项的要求。\nA.0.70 m\nB. 1.00 m\nC. 1.20 m\nD.1.40 m","answer":"C","id":"岩土工程-三-single-29","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":30,"sourcePage":24,"text":"软黏土的特性指标如下,请判定其中（）指标是肯定有问题的。\nA.无侧限抗压强度10 kPa\nB.静力触探比贯入阻力值30 kPa\nC.标准贯人锤击数8 击/30 cm\nD.剪切波速100 m/s","answer":"C","id":"岩土工程-三-single-30","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":31,"sourcePage":25,"text":"下列（)选项的岩体结构类型不属于《水利水电工程地质勘察规\n范》（GB 5028799)的岩体结构分类之列。\nA.整体状、块状、次块状结构\nB.巨厚层状、厚层状、中厚层状、互层和薄层状结构\nC.风化卸荷状结构和风化碎块状结构\nD.镶嵌碎裂结构和碎裂结构\n显的弹性变形\nA.凝胶型结构\nB.溶一凝胶型结构\nC.溶胶型结构\nD.固胶型结构","answer":"C","id":"岩土工程-三-single-31","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":32,"sourcePage":25,"text":"（）的沥青当施加荷载很小时,或在荷载作用时间很短时,具有明\n显的弹性变形。\nA.凝胶型结构\nB.溶一凝胶型结构\nC.溶胶型结构\nD.固胶型结构","answer":"A","id":"岩土工程-三-single-32","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":33,"sourcePage":25,"text":"某滞洪区本年滞洪时淤积了 3.0 m厚的泥沙,现进行勘察，下列\n)选项的考虑是错的。\nA.原地面下原来的正常固结土变成了超固结土\nB.新沉积的泥沙是欠固结土\nC.新沉积的饱和砂土地震时可能液化\nD.与一般第四系土比在同样的物理性质指标状况下,新沉积土的力学\n性质较差","answer":"A","id":"岩土工程-三-single-33","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":34,"sourcePage":25,"text":"勘察中,每层土应均匀采取土试样或进行原位测试,其数量不得少于\nβ)个。\nA.4\nB.6\nC.5\nD.8","answer":"B","id":"岩土工程-三-single-34","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":35,"sourcePage":25,"text":"有一砂土土坡,其砂土的内摩擦角 9=35°,坡度为1:1.5,当采用直线\n滑裂面进行稳定性分析时，下列（\n个滑裂面对应的安全系数最小（α为\n滑裂面与水平地面间夹角）。\nA. α =25o\nB. α =29o\nC. α =31°\nD.α =330\nB)","answer":"D","id":"岩土工程-三-single-35","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":36,"sourcePage":25,"text":"防止管涌的反滤层的填筑方式应为(\nA.将各级配的砂砾石拌和均匀后填筑\nB.顺水流方向分层,由细到粗分层碾压密实\nC.逆水流方向分层,由细到粗分层碾压密实\nD.只要求碾压密实、不透水","answer":"B","id":"岩土工程-三-single-36","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":37,"sourcePage":25,"text":"熔融状态的物质,经急冷处理,凝固成固态,形成的结构为\nB.玻璃体结构\nC.胶体结构\nD.溶胶结构\nA.晶体结构\nB).","answer":"B","id":"岩土工程-三-single-37","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":38,"sourcePage":25,"text":"同种材料（内部孔均为封闭孔）,当表观密度(p)增大时,材料的(\nC.强度下降\nA.密度增大\nB.导热性增大\nD.导热性减小","answer":"B","id":"岩土工程-三-single-38","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":39,"sourcePage":26,"text":"下列(\n卫）不是影响单桩水平承载力的因素。\nA.桩侧土性\nC.桩的材料强度 D.桩端人土深度\nB.桩端土性\nB. 15 mm ×15 mm × 15 μm\nA. 10 mm × 10 mm x 10 mm\nD. 7.07 mm ×7.07 mm ×7.07 mm\nC. 20 mm × 20 mm × 20 mm","answer":"B","id":"岩土工程-三-single-39","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"single","number":40,"sourcePage":26,"text":"混凝土立方体抗压强度试件的标准尺寸为（）。\nB. 15 mm ×15 mm ×15 mm\nA. 10 mm × 10 mm × 10 mm\nC. 20 mm × 20 mm ×20 mm\nD.7.07 mm ×7.07 mm ×7.07 mm","answer":"B","id":"岩土工程-三-single-40","typeLabel":"单项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":1,"sourcePage":26,"text":"岩体基本力学性质包括\nA.岩体的变形性质\nB.岩体的破坏特性\nC.岩体的强度性质\nD.岩体的应力特性\n用于下列(AC建设的岩土工程勘察。\nB.水利工程\nC.核电厂\nA.废弃物处理工程\nD.高速公路\nE.岸边工程","answer":"ABC","id":"岩土工程-三-multi-01","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":3,"sourcePage":26,"text":"以化学风化为主的环境下,下列（）矿物易风化。\nA.石英\nB.斜长石\nC.白云母\nD.黑云母","answer":"BCD","id":"岩土工程-三-multi-03","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":4,"sourcePage":26,"text":"按大中型水利水电工程勘察先后,可划分为规划、可行性研究、初步设\nA.从规划、可行性研究、初步设计到技施设计阶段,勘察范围逐渐加大\nB.从规划、可行性研究、初步设计到技施设计阶段,工作深度应依次加\nC.从规划、可行性研究、初步设计到技施设计阶段,勘察工作量应越来\n越大\nD.初步勘察阶段的工程地质勘察应查明水库建筑区的工程地质条件,\n进行选定坝型枢纽布置的地质论证和提供建筑物设计所需的工程\n地质资料","answer":"BD","id":"岩土工程-三-multi-04","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":5,"sourcePage":26,"text":"按《水利水电工程地质勘察规范》（GB 50287一1999）,初步设计阶段土\n石坝坝址勘察时,下述（）说法是正确的。\nA.工程地质测绘的范围应包括库址区及坝肩地段\nB.可采用综合测井查明覆盖层层次,测定土层密度\nC. 勘探点间距宜采用 50 ~100 m\nD.岩土试验时,第四系地层主要土层的物理力学性质试验组数累计不\n应小于 11 组","answer":"BCD","id":"岩土工程-三-multi-05","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":6,"sourcePage":27,"text":"根据地基的复杂程度,可按下列规定分为三个地基等级。符合下列条\n件之一者(AB为一级地基(复杂地基)。\nA.岩土种类多,很不均匀;性质变化大,需特殊处理地基\nB.严重湿陷、膨胀、盐渍、污染的特殊性岩土地基\nC.情况复杂,需作专门处理的岩土地基\nD.分布较均匀,但厚度很大的软土地基\nE.岩土种类较多,不均匀,性质变化较大\n（） 。","answer":"ABC","id":"岩土工程-三-multi-06","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":7,"sourcePage":27,"text":"深层搅拌法和高压旋喷法的区别是(\nA.适用的地基不同,前者适用于饱和软黏土,后者适用于粉细砂及冲\n填土\nB.拌和手段不同,前者是机械拌和,后者是高压射流切割拌和\nC.使用的主固化剂不同,前者主要是用水泥浆体做主固化剂,后者是\n用水直接拌和\nD.两者加固的机理不同,前者是应用复合地基的加固机理,后者是应\n用桩基原理进行加固","answer":"AB","id":"岩土工程-三-multi-07","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":8,"sourcePage":27,"text":"高压喷射法注浆有哪几种喷射移动方式？\nA.旋喷\nB.定喷\nC.摆喷\nD.雾喷","answer":"ABC","id":"岩土工程-三-multi-08","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":9,"sourcePage":27,"text":"石灰桩法特别适用于（地基的加固。\nA.黏性土\nB.杂填土\nC.新填土\nD.淤泥","answer":"CD","id":"岩土工程-三-multi-09","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":10,"sourcePage":27,"text":"粗集料的毛体积密度是在规定条件下,单位毛体积的质量。其中毛体\n积包括(AB\nA.矿质实体\nB.闭口孔隙\nC.开口孔隙\nD.颗粒间空隙\nA.地基土的天然含水量小于30%\nB.地基土的天然含水量大于70%\nC.地下水的pH值小于4\nD.地下水的 pH值大于12","answer":"ABC","id":"岩土工程-三-multi-10","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":11,"sourcePage":27,"text":"下述哪几种情况不宜于采用粉体喷搅法(干法)来处理？\nA.地基土的天然含水量小于30%\nB.地基土的天然含水量大于70%\nC.地下水的pH值小于4\nD.地下水的 pH值大于12\nA.在水上打直孔\nB.在两岸向河床打斜孔\nC.在岸边向河床开挖斜井\nD.开挖水下过河平洞","answer":"ABC","id":"岩土工程-三-multi-11","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":12,"sourcePage":27,"text":"对河床中陡倾角的断层,不适宜的勘探方法包括（）)\nA.在水上打直孔\nB.在两岸向河床打斜孔\nC.在岸边向河床开挖斜井\nD.开挖水下过河平洞","answer":"BCD","id":"岩土工程-三-multi-12","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":13,"sourcePage":27,"text":"采用文克勒地基模型计算地基梁板时,下列（）选项正确。\nA.基床系数是地基土引起单位变形时的压力强度\nB.基床系数是从半无限体理论中导出的土性指标\nC.按文克勒地基模型计算,地基变形只发生在基底范围内,基底范围\n以外没有地基变形\nD.文克勒地基模型忽略了地基中存在的剪应力","answer":"ACD","id":"岩土工程-三-multi-13","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":14,"sourcePage":28,"text":"在下列A阝情况下,桩基设计应考虑桩侧负摩阻力。\nA.穿越较厚欠固结土层进入相对较硬土层\nB.桩周存在软弱土层，邻近地面将有大面积长期堆载\nC.基坑施工临时降水,桩周为饱和软黏土\nD.桩穿越自重湿陷性黄士进入较硬土层","answer":"ABD","id":"岩土工程-三-multi-14","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":15,"sourcePage":28,"text":"当桩周产生负摩阻力时,下述B)不正确。\nA.中性点以上桩周土的下沉量大于桩的沉降量,中性点处二者相等，\n中性点以下桩的沉降量大于桩周土的下沉量\nB.负摩阻力值不应计入桩的荷载中\nC.在地表附近,桩与土的相对位移值最大,因此负摩阻力最大\nD.桩身轴力的最大值不是在桩顶,而是在中性点处\n(JGJ 94一1994）中推荐的方法。\nA.半经验实体深基础法\nB.等效作用分层总和法\nC.明德林一盖得斯法\nD.影响圆法","answer":"BC","id":"岩土工程-三-multi-15","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":16,"sourcePage":28,"text":"下述计算桩基础沉降的方法中,(AcD)不是《建筑桩基技术规范》\n(JGJ94一1994)中推荐的方法。\nA.半经验实体深基础法\nB.等效作用分层总和法\nC.明德林一盖得斯法\nD.影响圆法","answer":"ACD","id":"岩土工程-三-multi-16","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":17,"sourcePage":28,"text":"目前工程中在地基设计计算时,地基中应力的计算与分布采用的基本\n假设条件是（\nA.地基土是均匀连续的\nB.基础底面的压力看做是刚性荷载\nC.地基土是各向同性的\nD.地基在深度和水平方向是无限延伸的","answer":"ACD","id":"岩土工程-三-multi-17","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":18,"sourcePage":28,"text":"基础宽度为3 m,由上部结构传至基础底面压力分布为三角形,最大\n边缘压力为 80 kPa,最小边缘压力为零,基础埋置深度为 2 m,基础自重和基\n础上的土重的平均重度为 20.0 kN/m²,下列论述中ABC)观点是正确的。\nA.计算基础结构内力时,基础底面压力的分布符合小偏心的规定\nB.按地基承载力验算基础底面尺寸时,基础底面压力分布的偏心已经\n超过了现行《建筑地基基础设计规范》的规定\nC.作用于基础底面上的合力总和为240 kN\nD.作用于基础中轴线的力矩为 60 kN.m\nE．按地基承载力验算基础底面尺寸,考虑偏心荷载时,地基承载力特\n征值应大于 120 kPa 才能满足设计要求","answer":"ABCD","id":"岩土工程-三-multi-18","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":19,"sourcePage":29,"text":"黄土的湿陷起始压力 Ps在地基评价中起的作用有（C D。\nA.计算湿陷量\nB.计算自重湿陷量\nC.根据基底压力及埋深评价是否进行地基处理\nD.根据土层埋藏深度评价是否为自重湿陷性黄土","answer":"CD","id":"岩土工程-三-multi-19","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":20,"sourcePage":29,"text":"地面沉降的公害特点表现在以下（）方面。\nA.一般在地表以下发生且发展速度较快\nB.一般发生得较慢而难以明显感觉\nC.一般情况下已发生地面沉降的地面变形不可能完全恢复\nD.一般情况下,治理费用较高","answer":"BC","id":"岩土工程-三-multi-20","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":21,"sourcePage":29,"text":"-高压喷射法注浆有哪几种喷射移动方式？\nA.旋喷\nB.定喷\nC.摆喷\nD.雾喷","answer":"ABC","id":"岩土工程-三-multi-21","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":22,"sourcePage":29,"text":"石灰桩按其加固机理有哪几方面的作用(μ4)D\nA.成孔挤密\nB.膨胀挤密\nC.吸水作用\nD.置换作用","answer":"ABD","id":"岩土工程-三-multi-22","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":23,"sourcePage":29,"text":"《建筑桩基技术规范》（JGJ94一1994)的桩基沉降计算公式中,等效沉\n降系数取值时,下列(说法是正确的。\nA.与土的种类有关\nB.与沿承台短边(矩形布桩时)布桩多少有关\nC.与桩中心距大小有关\nD.与承台长宽比有关\nE.当承台尺寸、桩径、桩距相同时,桩愈长。值愈大,桩愈短山。值愈小","answer":"BCD","id":"岩土工程-三-multi-23","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":24,"sourcePage":29,"text":"在软土地基中采用密集的钢筋混凝土预制桩,施工中可能产生下列\n不利影响。\nA.土体位移和地面隆起\nB.可能产生负摩阻力\nC.泥浆污染\nD.对环境影响小\nE.桩接头被拉断","answer":"ABE","id":"岩土工程-三-multi-24","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":25,"sourcePage":29,"text":"矿质混合料的最大密度曲线是通过试验提出的一种（%\nA.实际曲线\nB.理论曲线\nC.理想曲线\nD.理论直线","answer":"BC","id":"岩土工程-三-multi-25","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":26,"sourcePage":29,"text":"(B\n)属于水硬性胶凝材料,而（属于气硬性胶凝材料。\nA.石灰 石膏\nB.水泥 石灰\nC.水泥石膏\nD.石膏 石灰\n表示。\nA.筛析法\nB.比表面积法\nC.试饼法\nD.雷氏法\nA3.LD","answer":"BC","id":"岩土工程-三-multi-26","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":27,"sourcePage":29,"text":"水泥细度可用下列()表示。\nA.筛析法\nB.比表面积法\nC.试饼法\nD.雷氏法","answer":"AB","id":"岩土工程-三-multi-27","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":28,"sourcePage":30,"text":"水泥石的腐蚀包括（\nA.溶析性侵蚀\nB.硫酸盐的侵蚀\nC.镁盐的侵蚀\nD、碳酸的侵蚀\nB.粉煤灰水泥\nA.硅酸盐水泥\nD.普通硅酸盐水泥\nC.矿渣水泥\nABED","answer":"ABCD","id":"岩土工程-三-multi-28","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":29,"sourcePage":30,"text":"五大品种水泥中,抗冻性好的是（A D。\nA.硅酸盐水泥\nB.粉煤灰水泥\nC.矿渣水泥\nD.普通硅酸盐水泥\nA.含泥量和泥块含量\nB.硫化物和硫酸盐含量\nD.云母含量\nC.轻物质含量","answer":"AD","id":"岩土工程-三-multi-29","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":30,"sourcePage":30,"text":"集料中有害杂质包括\nA.含泥量和泥块含量\nB.硫化物和硫酸盐含量\nD.云母含量\nC.轻物质含量","answer":"ABCD","id":"岩土工程-三-multi-30","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":31,"sourcePage":30,"text":"混凝土配合比设计时必须按耐久性要求校核()。\nB.单位水泥用量\nC.浆集比\nD.水灰比\nA.砂率\nABCD","answer":"BD","id":"岩土工程-三-multi-31","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":32,"sourcePage":30,"text":"粉煤灰的技术指标包括(\nA.细度\nB. 需水量比\nC.烧失量\nD.三氧化硫含量","answer":"ABCD","id":"岩土工程-三-multi-32","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":33,"sourcePage":30,"text":"对于砖、多孔混凝土或其他多孔材料用砂浆,其强度主要取决于（CD\nA.水灰比\nB.单位用水量C.水泥强度\nD.水泥用量","answer":"CD","id":"岩土工程-三-multi-33","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":34,"sourcePage":30,"text":"可用（）指标表征沥青材料的使用安全性。\nC.脆点\nD.燃点\nA.闪点\nB.软化点","answer":"AD","id":"岩土工程-三-multi-34","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":35,"sourcePage":30,"text":"煤沥青与石油沥青相比（）。\nB.温度稳定性较低\nA.温度稳定性较高\nC.与矿质集料的黏附性较好\nD.与矿质集料的黏附性较差\nA.冷态施工，节约能源\nB.利于施工\nC.节约沥青\nD.保护环境,保障健康\nA.乳化剂提高界面张力的作用\nB.乳化剂降低界面张力的作用\nD.双电层的稳定结构\nC.界面膜的保护作用\nAB D","answer":"BC","id":"岩土工程-三-multi-35","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":37,"sourcePage":30,"text":"乳化沥青形成的机理是\nA.乳化剂提高界面张力的作用B.乳化剂降低界面张力的作用\nD.双电层的稳定结构\nC.界面膜的保护作用\nA.炭黑\nB.高钙粉煤灰C.火山灰\nD.页岩粉","answer":"BCD","id":"岩土工程-三-multi-37","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":38,"sourcePage":30,"text":"可以用做沥青微填料的物质是(\nD.页岩粉\nA.炭黑\nB.高钙粉煤灰\nC.火山灰","answer":"ABCD","id":"岩土工程-三-multi-38","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":39,"sourcePage":30,"text":"我国现行国家标准测定金属硬度的方法有（AB\nD.摩氏硬度\nA.布氏硬度\nB.络氏硬度\nC.维氏硬度","answer":"ABC","id":"岩土工程-三-multi-39","typeLabel":"多项选择题"},{"subject":"岩土工程","set":"三","type":"multi","number":40,"sourcePage":30,"text":"用于土木建筑的钢材,根据工程使用条件和特点,应具备下列（ABV\n技术要求。\nA.良好的综合力学性能\nB.良好的焊接性\nC.良好的抗蚀性\nD.越小越好的屈强比","answer":"ABC","id":"岩土工程-三-multi-40","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"judge","number":1,"sourcePage":1,"text":"其他拌和及养护用水配制的水泥砂浆28d抗压强度不得低于用标准饮用水配制的砂浆抗压强度的90%。","answer":"T","id":"混凝土工程-一-judge-01","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":2,"sourcePage":1,"text":"普通硅酸盐水泥42.5及42.5R的3d抗压强度分别应大于17MPa及22MPa，抗折强度分别大于3.5MPa\n及 4.0 MPa。（）)","answer":"T","id":"混凝土工程-一-judge-02","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":3,"sourcePage":1,"text":"普通减水剂主要有木质素磺酸钙（木钙）、木质素磺酸钠（木钠）、木质素磺酸镁、三乙醇胺。（）","answer":"F","id":"混凝土工程-一-judge-03","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":4,"sourcePage":1,"text":"石料软弱颗粒含量试验中对骨料粒径为10～20mm的，其加压荷载为0.25kN。","answer":"T","id":"混凝土工程-一-judge-04","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":5,"sourcePage":1,"text":"粗骨料D80以上粒径的含泥量应<0.5%。","answer":"T","id":"混凝土工程-一-judge-05","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":6,"sourcePage":1,"text":"橡塑止水带是利用其材质的不透水性和耐水性阻止水工建筑物上游水经过接缝的渗漏。（","answer":"T","id":"混凝土工程-一-judge-06","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":7,"sourcePage":1,"text":"水工建筑物的变形接缝采用硬态（质）的黄铜片作为止水铜片。","answer":"F","id":"混凝土工程-一-judge-07","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":8,"sourcePage":1,"text":"热轧带肋钢筋的拉伸试样和弯曲试样都为2根，应由所检批的钢筋中任选1根切取。","answer":"F","id":"混凝土工程-一-judge-08","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":9,"sourcePage":1,"text":"常用水泥净浆的初凝时间≥45min，终凝时间≤8 h。","answer":"F","id":"混凝土工程-一-judge-09","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":10,"sourcePage":1,"text":"钢筋拉伸试验的两个数据平均后的平均值不小于标准规定的值就可认为其符合标准要求。（）","answer":"F","id":"混凝土工程-一-judge-10","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":11,"sourcePage":1,"text":"除成型碾压混凝土试件振动密实时必须加压重块(试件表面压强为4900Pa)外，碾压混凝土性能试验方\n法与常态混凝土试验方法相同。","answer":"T","id":"混凝土工程-一-judge-11","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":12,"sourcePage":1,"text":"V形漏斗试验方法用于测定自密实混凝土拌和物流动性。","answer":"F","id":"混凝土工程-一-judge-12","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":13,"sourcePage":1,"text":"当试件高度／直径大于2时，试件中间部分不受端面摩阻力影响而处于单轴压缩状态。","answer":"T","id":"混凝土工程-一-judge-13","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":14,"sourcePage":1,"text":"混凝土热物理性能试验结果用于大体积结构混凝土温度应力计算，决定是否需要分缝、表面保温或者是\n对原材料预冷，以防止温度裂缝。","answer":"T","id":"混凝土工程-一-judge-14","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":15,"sourcePage":1,"text":"轻烧MgO膨胀剂是由菱镁矿石(MgCO3)经过800℃左右温度熳烧、粉磨而成。（）","answer":"F","id":"混凝土工程-一-judge-15","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":16,"sourcePage":1,"text":"骨料的岩石种类对混凝土干缩试验结果的影响表明，砂岩骨料的混凝土干缩最小，石英岩骨料的混凝土\n干缩最大。（）","answer":"F","id":"混凝土工程-一-judge-16","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":17,"sourcePage":1,"text":"钢纤维混凝土试验方法与普通混凝土基本相同，其特有试验方法有钢纤维混凝土拌和物钢纤维体积率、\n钢纤维混凝土弯曲韧性和弯曲初裂强度及纤维混凝土收缩开裂等试验方法。","answer":"T","id":"混凝土工程-一-judge-17","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":18,"sourcePage":1,"text":"水下不分散混凝土原材料与普通混凝土基本相同，其不同点是必须掺用抗分散剂，以及粗骨料最大粒径\n不宜超过40mm。","answer":"F","id":"混凝土工程-一-judge-18","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":19,"sourcePage":1,"text":"混凝土的抗渗等级，以每组六个试件中三个出现渗水时的水压力乘以10表示。","answer":"F","id":"混凝土工程-一-judge-19","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":20,"sourcePage":1,"text":"混凝土水胶比越大，混凝土越不密实、孔隙率越大，外界C02易侵入，越容易碳化。（","answer":"T","id":"混凝土工程-一-judge-20","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":21,"sourcePage":1,"text":"碾压混凝土层面抗剪强度（t）与法向应力(s)呈非线性关系，直线与纵轴的截距是黏聚力。（）\n距离不宜小于裂缝深度的5倍，任何情况下不得小于4倍。（）","answer":"F","id":"混凝土工程-一-judge-21","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":22,"sourcePage":1,"text":"采用超声波平测法检测裂缝深度时，当有钢筋穿过裂缝时，发射、接收换能器连线距离钢筋轴线的最短\n距离不宜小于裂缝深度的5倍，任何情况下不得小于4倍。（）","answer":"F","id":"混凝土工程-一-judge-22","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":23,"sourcePage":1,"text":"当结构具备一对相互平行的测试面，且测试面间距较小时，应优先采用超声波双面斜测法检测裂缝深度。","answer":"F","id":"混凝土工程-一-judge-23","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":24,"sourcePage":1,"text":"当换能器置于裂缝两侧并逐渐增大间距，首波的振幅相位先后发生90°的转动变化，即存在着一个使首\n波相位发生转动变化的临界点。","answer":"T","id":"混凝土工程-一-judge-24","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":25,"sourcePage":1,"text":"超声波检测裂缝深度是基于混凝土的声阻抗远小于空气的声阻抗。","answer":"F","id":"混凝土工程-一-judge-25","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":26,"sourcePage":1,"text":"混凝土抗压强度标准差高(4.5MPa)表示混凝土生产管理水平高。","answer":"F","id":"混凝土工程-一-judge-26","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":27,"sourcePage":1,"text":"混凝土碳化是空气中的二氧化碳与混凝土中的氢氧化钙不断反应，使其碱度不断降低，促使钢筋表面的\n钝化膜破坏，引起钢筋锈蚀。","answer":"T","id":"混凝土工程-一-judge-27","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":28,"sourcePage":1,"text":"现场混凝土质量检验以抗压强度为主，并以边长为150mm立方体试件的抗压强度为标准。（）","answer":"T","id":"混凝土工程-一-judge-28","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":29,"sourcePage":1,"text":"超声回弹综合法需要测量的参数包括回弹值、碳化值和声速值。","answer":"F","id":"混凝土工程-一-judge-29","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"judge","number":30,"sourcePage":1,"text":"半电池电位法用于现场无破损检测海洋环境水工钢筋混凝土构筑物中钢筋腐蚀性状，该方法不适\n用于混凝土已饱水或接近饱水的构件。","answer":"T","id":"混凝土工程-一-judge-30","typeLabel":"判断题"},{"subject":"混凝土工程","set":"一","type":"single","number":1,"sourcePage":2,"text":"水工混凝土常用的减水剂为（\nA：木质素磺酸钠（木钠）\nB．松香热聚物\nC.硫酸钠","answer":"A","id":"混凝土工程-一-single-01","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":2,"sourcePage":2,"text":"硅酸盐水泥凝结时间在施工中有重要意义，其正确的范围是(\nA．初凝时间≥45min，终凝时间≤600min\nB．初凝时间≥45min，终凝时间≤390min\nC.．初凝时间≤45min，终凝时间≥150min","answer":"B","id":"混凝土工程-一-single-02","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":3,"sourcePage":2,"text":"根据《水工混凝土施工规范》（DIMT5144--2001)，混凝土拌和生产过程中，砂子、小石的含水\n量每)检测 1 次。\nA.4h\nB. 8h\nC. 台班\nD. 天","answer":"A","id":"混凝土工程-一-single-03","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":4,"sourcePage":2,"text":"拌和水和养护水采用符合国家标准的饮用水。采用其他水质时pH值(\nA. >4\nB. >5\nC. >6","answer":"A","id":"混凝土工程-一-single-04","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":5,"sourcePage":2,"text":"水泥胶砂强度检测，单个试件强度值超出平均值(\n)，剔除。\nA. ±5%\nB. ±10%\nC. ±15%","answer":"B","id":"混凝土工程-一-single-05","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":6,"sourcePage":2,"text":"混凝土粗骨料吸水率限制值为（）。\nA.≤2.5%\nB.≤3.0%\nC.≤3.5%\nD.≤4.0%","answer":"A","id":"混凝土工程-一-single-06","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":7,"sourcePage":2,"text":"水泥安定性检测，雷氏夹指针尖端间的距离增加值应不大于(\nA. 3mm\nB. 4 mm\nC. 5 mm\nD. 6mm","answer":"C","id":"混凝土工程-一-single-07","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":8,"sourcePage":2,"text":"碾压混凝土拌和物工作度测定的指标为（\nA．落度\nB.扩度\nC.维勃稠度VB值\nD. VC值","answer":"D","id":"混凝土工程-一-single-08","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":9,"sourcePage":2,"text":"掺抗分散剂的水下不分散混凝土的28d水气强度比应(\nA.>60%\nB.>70%\nC.>80%\nD.>90%","answer":"B","id":"混凝土工程-一-single-09","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":10,"sourcePage":2,"text":"自流平自密实混凝土不宜掺用(\n)。\nA．减水剂B．增黏剂\nC. 纤维\nD.速凝剂","answer":"D","id":"混凝土工程-一-single-10","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":11,"sourcePage":2,"text":"沥青混凝土中，粗骨料最大粒径应不大于表层厚度的(\nB. 2/5\nD. 1/2\nA. 1/5\nC. 1/3","answer":"C","id":"混凝土工程-一-single-11","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":12,"sourcePage":2,"text":"合格铜止水片抗拉强度应不低于(\nA. 200 MPa\nB.220 MPa\nC.240 MPa\nD.260 MPa","answer":"C","id":"混凝土工程-一-single-12","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":13,"sourcePage":2,"text":"PVC止水带成品的扯断伸长率应(\n)。\nA.≥250%\nB.≥300%\nC.≥350%\nD.≥400%","answer":"B","id":"混凝土工程-一-single-13","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":14,"sourcePage":2,"text":"热轧带肋钢筋拉伸试验试样长度要求为(\nA. 5d\nB. 10d\nC.0.5元(d+a)+140 mm\nD.100 mm","answer":"A","id":"混凝土工程-一-single-14","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":15,"sourcePage":2,"text":"热轧带肋钢筋弯曲性能检测试样数为(\n)根。\nA. 1\nB. 2 (\nC. 3 D. 4","answer":"B","id":"混凝土工程-一-single-15","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":16,"sourcePage":2,"text":"海水环境混凝土配合比设计中，混凝土配制强度应满足(\n)。\nA．设计强度\nB．耐久性要求所决定的强度\nC．设计强度或耐久性要求所决定的强度\nD．设计强度和耐久性要求所决定的强度","answer":"D","id":"混凝土工程-一-single-16","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":17,"sourcePage":2,"text":"在设计混凝土配合比时，配制强度要比设计要求的强度等级高，提高幅度的多少，取决于\nA：设计要求的强度保证率\nB．对落度的要求\nC．施工水平的高低\nD．设计要求的强度保证率和施工水平的高低","answer":"D","id":"混凝土工程-一-single-17","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":18,"sourcePage":2,"text":"机械拌和一次拌和量不宜大于搅拌机容量的(\nA. 70%\nB. 75%\nC. 80%\nD. 90%","answer":"C","id":"混凝土工程-一-single-18","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":19,"sourcePage":2,"text":"碾压混凝土VC值测试的计时终点为(\n)。\nA．透明塑料压板的整个底面与混凝土接触的空隙都被水泥浆填满\nB．透明塑料压板的整个底面都与水泥浆接触，允许存在少量闭合气泡\nC．塑料压板的周边侧面全部被泛上来的水泥浆覆盖\nD．塑料压板周边全部出现水泥浆","answer":"D","id":"混凝土工程-一-single-19","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":20,"sourcePage":3,"text":"混凝土大坝结构拉应力和温度应力计算，抗拉强度采用的是（\n)。\nA.劈裂抗拉强度\nB.抗弯强度\nC．轴拉强度\nD．抗剪强度\n)。","answer":"C","id":"混凝土工程-一-single-20","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":21,"sourcePage":3,"text":"下列不属于普通混凝土用细骨料的质量要求应控制的指标是(\nA.颗粒级配\nB.含泥量\nC.强度和坚固性","answer":"C","id":"混凝土工程-一-single-21","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":22,"sourcePage":3,"text":"在预应力混凝土结构中，当采用钢绞线、钢丝、热处理钢筋做预应力钢筋时，混凝土强度等级可采用\n（)。\nA. C30\nB. C40\nC. C50","answer":"B","id":"混凝土工程-一-single-22","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":23,"sourcePage":3,"text":"对混凝土有利的变形为(\nC.湿涨\nA． 徐变B．干缩","answer":"C","id":"混凝土工程-一-single-23","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":24,"sourcePage":3,"text":"混凝土强度等级是根据（\n)标准值来确定的。\nA.圆柱体抗压强度\nB.立方体抗压强度\nC．劈裂抗拉强度","answer":"B","id":"混凝土工程-一-single-24","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":25,"sourcePage":3,"text":"钻芯法检测混凝土强度，对不同长径比的芯样应进行修正，若测得的长径比为1.2，则修正系数为\n（)。\nA. =1\nB. >1\nC. <1","answer":"A","id":"混凝土工程-一-single-25","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":26,"sourcePage":3,"text":"下列哪项指标中有任一项不合格的，即为不合格品水泥？（）\nA．细度、终凝时间、强度、氧化镁\nB．强度、安定性、氧化镁、初凝时间、终凝时间\nC.强度、混合物掺加量、初凝时间、三氧化硫","answer":"B","id":"混凝土工程-一-single-26","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":27,"sourcePage":3,"text":"对于建筑物的外部碾压混凝土，相对压实度不得小于(\nB. 97%\nC. 98%\nA. 96%","answer":"C","id":"混凝土工程-一-single-27","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":28,"sourcePage":3,"text":"其他条件一定时混凝土强度随水灰比的增大而(\nA． 增大　B. 不变　C． 降低","answer":"C","id":"混凝土工程-一-single-28","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":29,"sourcePage":3,"text":"混凝土抗冻等级F15号中的15是指（\n)。\nA.承受冻融循环的次数不少于15次\nB.冻结后在15℃的水中融化\nC.最大冻融次数后强度损失率不超过15%\nD.最大冻融次数后质量损失率不超过15%","answer":"A","id":"混凝土工程-一-single-29","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":30,"sourcePage":3,"text":"回弹法检测混凝土强度时，碳化深度测点数量不少于构件回弹测区数的(\nA. 10%\nB.20%\nC. 30%","answer":"C","id":"混凝土工程-一-single-30","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":31,"sourcePage":3,"text":"混凝土劈拉强度试验采用断面为5mmx5mm正方形钢垫条，试件尺寸为(\n)立方体。\nB.20cm×20cm×20cm\nC. 45cm×45cm×45cm\nA.15cm×15cm×15cm","answer":"A","id":"混凝土工程-一-single-31","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":32,"sourcePage":3,"text":"收缩开裂试验每个试件各用1台电风扇吹试件表面，风向平行试件，风速为(\n)），环境温度为\n20℃±2℃，相对湿度不大于60%。\nA. 0.5 m/s B. 1 m/s\nC. 2 m/s","answer":"A","id":"混凝土工程-一-single-32","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":33,"sourcePage":3,"text":"GB1499.2--2007规定，根据需方要求钢筋可进行反向弯曲性能试验，反向弯曲的弯心直径比弯曲试验\n相应增加1个钢筋直径，先（)向弯曲()，后（)向弯曲（)。\nA．正45°，反23°B．正90°，反45°\nC.反45°，正23°","answer":"A","id":"混凝土工程-一-single-33","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":34,"sourcePage":3,"text":"牌号为Q235的低碳钢热轧圆盘条的拉伸性能指标为：屈服点≥(\n)MPa，抗拉强度≥(\n)MPa，伸\n长率≥()%。\nA. 235,410,27\nB.235,410,23\nC.235,375,23","answer":"B","id":"混凝土工程-一-single-34","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":35,"sourcePage":3,"text":"导热系数是指厚度1m、表面积1m²的材料，当两侧面温差为1℃时，在lh内所传导的热量，其单位\n为kJ/(mh·℃)。导热系数越小，材料的隔热性能愈(\nA 好　B. 差　C. 不变\n)为准。","answer":"A","id":"混凝土工程-一-single-35","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":36,"sourcePage":3,"text":"水泥安定性试验有争议时一般以(\nA．饼法　B．雷氏法\nC.．饼法和雷氏法同时","answer":"B","id":"混凝土工程-一-single-36","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":37,"sourcePage":3,"text":"关于水灰比对混凝土拌和物特性的影响，说法不正确的是(\nA．水灰比越大，黏聚性越差\nB．水灰比越小，保水性越好\nC．水灰比越大，落度越小","answer":"C","id":"混凝土工程-一-single-37","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":38,"sourcePage":3,"text":"由于泵送混凝土要求泌水率低，特别是压力泌水率要低，因此泵送混凝土用水泥不宜选用（\nA．矿渣水泥\nB.硅酸盐水泥\nC.．普通硅酸盐水泥","answer":"A","id":"混凝土工程-一-single-38","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":39,"sourcePage":3,"text":"超声波平测法检测裂缝深度时，将发射、接收换能器置于裂缝两侧，两换能器(\n)距离等间隔增大，\n测量并记录声时，计算得到裂缝深度。\nB.中到中\nA．内边缘\nC．外边缘","answer":"A","id":"混凝土工程-一-single-39","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"single","number":40,"sourcePage":4,"text":"碾压混凝土的主要特点是(\nA.水泥用量小\nB．和易性好\nC．水化热高","answer":"A","id":"混凝土工程-一-single-40","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":1,"sourcePage":4,"text":"水工混凝土工程质量检测的依据是(\nA：国家标准、水利水电行业标准\nB．工程承包合同认定的其他标准和文件\nD．批准的设计文件、金属结构、机电设备安装等技术说明书\nC．承包单位自定规程","answer":"ABD","id":"混凝土工程-一-multi-01","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":2,"sourcePage":4,"text":"优质粉煤灰对混凝土性能的影响为(\nB．提高混凝土早期强度\nA．提高混凝土可泵性\nD．抑制混凝土碱骨料反应\nC.．降低胶凝材料水化热","answer":"ACD","id":"混凝土工程-一-multi-02","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":3,"sourcePage":4,"text":"水泥胶砂强度检验环境条件为(\nA．实验室温度：20℃±2℃，湿度≥50%\nB.实验室温度大于17℃且小于25℃\nC．养护室温度：20℃±3℃，湿度90%\nD.养护室温度：20℃±1℃，湿度≥90%\n)的颗粒，在(","answer":"AD","id":"混凝土工程-一-multi-03","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":4,"sourcePage":4,"text":"碎石或卵石的压碎指标，是指粒径为(\n)荷载作用下压碎颗粒含量的百分率。\nC. 200 kN\nA. 10~20mm\nB. 5~20mm\nD. 100 kN","answer":"AC","id":"混凝土工程-一-multi-04","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":5,"sourcePage":4,"text":"提高混凝土强度，细骨料品质改善措施有（\n)。\nA．宜采用在细度模数2.4～2.8范围的中粗砂\nB．降低砂的含泥量\nD．采用高吸水率砂\nC．采用高密度砂","answer":"ABC","id":"混凝土工程-一-multi-05","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":6,"sourcePage":4,"text":"混凝土碱骨料反应的必要条件为（\n)。\nA.骨料碱活性\nB．混凝土中足够的碱含量\nD.潮湿环境\nC．低温环境","answer":"ABD","id":"混凝土工程-一-multi-06","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":7,"sourcePage":4,"text":"提高水泥强度的措施包括(\n)。\nB．提高C3A含量\nA.提高C3S含量\nC．增加水泥比表面积\nD．增加石膏含量","answer":"AC","id":"混凝土工程-一-multi-07","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":8,"sourcePage":4,"text":"采用以下措施中的（），改善粗骨料品质，可提高混凝土强度。\nA.降低粗骨料针片状颗粒含量\nB.降低粗骨料含泥量\nC．采用高压碎指标值的骨料\nD.优化粗骨料级配","answer":"ABD","id":"混凝土工程-一-multi-08","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":9,"sourcePage":4,"text":"碾压混凝土配合比的特点包括(\nA：粉煤灰掺量比普通混凝土大\nB.胶凝材料用量比普通混凝土低\nC．砂率比普通混凝土小\nD.引气剂掺量比普通混凝土大\n)。","answer":"ABD","id":"混凝土工程-一-multi-09","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":10,"sourcePage":4,"text":"聚合物水泥混凝土（砂浆）的特性包括(\nB.提高混凝土黏结强度\nA：提高混凝土抗裂性\nC．提高混凝土耐久性\nD.提高混凝土抗渗性\n)。","answer":"ABCD","id":"混凝土工程-一-multi-10","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":11,"sourcePage":4,"text":"泵送混凝土配合比的特点包括(\nA．粉煤灰掺量比普通混凝土大\nB．胶凝材料用量比普通混凝土多\nC．砂率比普通混凝土大\nD.引气剂掺量比普通混凝土大","answer":"BC","id":"混凝土工程-一-multi-11","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":12,"sourcePage":4,"text":"钢纤维混凝土配合比的特点包括(\nA．砂率比普通混凝土大\nB.胶凝材料用量多\nC.单位用水量比普通混凝土高\nD.骨料粒径不宜大于钢纤维长度的2/3","answer":"ABCD","id":"混凝土工程-一-multi-12","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":13,"sourcePage":4,"text":"提高橡胶止水带抗绕渗性能的要点包括(\nA．材质有一定的拉伸强度和扯断伸长率，有足够的回弹变形\nB．材质有一定的硬度和较小的压缩永久变形\nC．宜采用复合有密封材料的止水带\nD.采用中心非圆孔拱圈变形的止水带安装时要注意拱圈应面向水流方向","answer":"ABC","id":"混凝土工程-一-multi-13","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":14,"sourcePage":4,"text":"止水填料由下列原材料中的（\n)构成，具有耐久性、不透水性和流动变形性能，以及与水泥混凝土面\n的黏附性。\nA．黏结剂\nB．增强剂\nC．活性剂\nD.活性填料\n)。","answer":"ABCD","id":"混凝土工程-一-multi-14","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":15,"sourcePage":5,"text":"HRB400钢筋表示(\nA.热轧带肋钢筋\nB.冷轧带肋钢筋\nC.钢筋屈服点最小值\nD.钢筋抗拉强度","answer":"AC","id":"混凝土工程-一-multi-15","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":16,"sourcePage":5,"text":"碾压混凝土配合比设计龄期宜选用（\n)。\nA. 28d\nB.90 d\nC. 180 d\nD. ly","answer":"BC","id":"混凝土工程-一-multi-16","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":17,"sourcePage":5,"text":"大坝常态混凝土拌和物检测的内容包括(\n)。\nA.落度\nB．扩散度\nC. VC 值\nD.含气量","answer":"AD","id":"混凝土工程-一-multi-17","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":18,"sourcePage":5,"text":"混凝土立方体抗压强度测试时产生偏心受压的原因可能有(\n)。\nB．压力机球座不灵活\nA．试模尺寸不标准\nD.试件的承压面与成型时的顶面相垂直\nC.加载速度大于0.3MPa/s～0.5MPa/s","answer":"AB","id":"混凝土工程-一-multi-18","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":19,"sourcePage":5,"text":"混凝土劈裂抗拉强度测试时，以下不符合《水工混凝土试验规程》(SL352--2006)规定的操作是(\nA．制作标准试件所用混凝土骨料的最大粒径不应大于30mm。\nB．垫条材料宜采用三合板。\nC．承压面应与成型时的顶面垂直，垫条方向应与成型时的顶面平行。\nD.试验加载速度为0.04～0.06MPa/s。","answer":"ABC","id":"混凝土工程-一-multi-19","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":20,"sourcePage":5,"text":"混凝土自生体积变形测试时，试件应处在(\n)条件之下。\nA. 恒温 B、恒湿 C、绝湿\nD、无外部荷载","answer":"ACD","id":"混凝土工程-一-multi-20","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":21,"sourcePage":5,"text":"以下说法错误的是（\nA、上屈服强度（ReH)：指试样发生屈服而力首次下降前的最高应力\nB、下屈服强度（ReL）：在屈服期间，初始瞬时效应时的最低应力\nC、抗拉强度（Rm）指相应最小力（Fm）的应力\nD、断后伸长率指原始标距LO与断后标距的残余伸长（Lu-LO）之比的百分率","answer":"BCD","id":"混凝土工程-一-multi-21","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":22,"sourcePage":5,"text":"以下说法正确的有（）\nA.冷轧带肋钢筋分为5个牌号\nB.热轧钢筋分为5个牌号\nC.冷拔低碳钢丝分为甲乙两级\nD.预应力混凝土用钢丝分为5种","answer":"AC","id":"混凝土工程-一-multi-22","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":23,"sourcePage":5,"text":"超声波在混凝土中的衰减包括(\nD．吸收衰减\nA.漫射衰减\nB．散射衰减\nC.扩散衰减","answer":"BCD","id":"混凝土工程-一-multi-23","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":24,"sourcePage":5,"text":"纤维混凝土是以混凝土为基体，外掺（\n)材料而成。\nD.．聚丙乙烯\nA.人造丝\nB.碳纤维\nC.玻璃纤维","answer":"ABC","id":"混凝土工程-一-multi-24","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":25,"sourcePage":5,"text":"对碾压混凝土组成材料的要求正确的是(\n)。\nA.骨料最大粒径以20mm为宜\nB.当不用混合材料或用量很少时，宜选用矿渣水泥\nC．当混合材料掺量较高时宜选用普通硅酸盐水泥\nD.不得加入减水剂","answer":"ABC","id":"混凝土工程-一-multi-25","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":26,"sourcePage":5,"text":"近年来提倡用（)作为我国预应力混凝土结构的主力钢筋。\nA：预应力钢绞线\nB.冷拉钢筋C.预应力钢绞钢丝\nD.热处理钢筋","answer":"AC","id":"混凝土工程-一-multi-26","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":27,"sourcePage":5,"text":"水泥砂浆拌和物性能试验包括(\nA．稠度B．泌水率\nC．表观密度\nD.含气量\n()。","answer":"ABCD","id":"混凝土工程-一-multi-27","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":28,"sourcePage":5,"text":"以下说法正确的是(\nA：水下混凝土不分散剂主要有聚丙烯醛胺类、纤维类\nB.粗骨料针片状含量应≤15%\nC．安定性用试饼法检验时，其直径50～60mm。中心厚约10mm边缘渐薄\nD.用于拌合和养护混凝土的用水是饮用水","answer":"ABD","id":"混凝土工程-一-multi-28","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":29,"sourcePage":5,"text":"混凝土常规性能质量检测包括(\nA．抗压强度\nD．抗冻等级\nB.抗渗等级\nC.抗侵蚀性试验","answer":"ABD","id":"混凝土工程-一-multi-29","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":30,"sourcePage":5,"text":"超声波平测法检测裂缝深度分为(\nA．顺缝测量\nB．不跨缝测量\nC．不顺缝测量D.．跨缝测量","answer":"BD","id":"混凝土工程-一-multi-30","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":31,"sourcePage":5,"text":"大中型水利水电工程，混凝土配合比设计多采用绝对体积法，配合比设计时应考虑的设计参数有(\nA.单位用水量B.水胶比（水灰比）\nC．水泥用量D.砂率","answer":"ABD","id":"混凝土工程-一-multi-31","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":32,"sourcePage":6,"text":"以下（)是目前常采用的橡塑止水带断面型式。\nD.2型止水带\nA.平板型止水带\nB.中心圆孔型止水带\nC．直线型止水带","answer":"ABD","id":"混凝土工程-一-multi-32","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":33,"sourcePage":6,"text":"沥青混凝土建筑物长期遭受大气、阳光和水的作用，要求沥青混凝土的耐久性包括（\n)。\nA.可塑性\nB．抗老化性\nC.水稳定性\nD.抗疲劳性","answer":"BCD","id":"混凝土工程-一-multi-33","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":34,"sourcePage":6,"text":"以下说法正确的是()。\nA．水泥主要化学成分有CaO、Si02、A1203及Fe203，等氧化物组成\nB．水泥水化的温度越高，凝结硬化越慢\nC.水泥细度越细，早期水化热越高\nD.试体成型的实验室温度应保持在20℃±2℃，相对湿度应不低于50%","answer":"AD","id":"混凝土工程-一-multi-34","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":35,"sourcePage":6,"text":"混凝土弹性模量试验需要测出应力一应变曲线，曲线上选两点连成直线，直线的斜率即是混凝土弹性模\n量，抗压弹性模量取曲线上（\n)和()两点直线的斜率。\nA. O 点 B. 0.5 MPa\nC.40%极限抗压强度\nD.60%极限抗压强度","answer":"BC","id":"混凝土工程-一-multi-35","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":36,"sourcePage":6,"text":"芯样尺寸偏差及外观质量有以下情况之一者，不能作抗压强度试验(\nA沿芯样高度任一直径与平均直径相差达2mm以上\nB.端面的不平整度在100 mm长度内超过0.1mm\nC.．端面与轴线的不垂直度超过20\nD.端面补平后的芯样高度1.0 ～2.0D(D为芯样试件平均直径)","answer":"ABC","id":"混凝土工程-一-multi-36","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":37,"sourcePage":6,"text":"为改善沥青混凝土热稳定性，可掺加下列掺合料(\nC.树脂\nD．石蜡\nA．石棉B．橡胶","answer":"ABC","id":"混凝土工程-一-multi-37","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":38,"sourcePage":6,"text":"回弹法现场检测的要求（包括对回弹测区所在混凝土表面的要求、测区数量、面积、测区内测点数的规\n定)，以下说法正确的是()。\nA．测区表面应清洁、平整、干燥，弹击时避开气孔及外露石子\nB、被测结构及构件上均匀布置测区，测区数不少于10个，相邻测区间距小于3m\nC、测区面积25cm×25cm\nD、每一测区弹击16点，有两个测面时，每面弹击8点。测区内相邻测点间距大于2cm","answer":"AD","id":"混凝土工程-一-multi-38","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":39,"sourcePage":6,"text":"下列说法正确的有（）\nA、混凝土拌和物的性能主要有工作性、含气量与凝结时间三项\nB、混凝土拌和物工作性包括流动性、可塑性、稳定性、易密性四种特性\nC、骨料最大粒径越大，在相同用水量尾部下混凝土拌和物的流动性就越小\nD、砂率过大或过小均会使混凝土拌和物工作性降低","answer":"ABD","id":"混凝土工程-一-multi-39","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"一","type":"multi","number":40,"sourcePage":6,"text":"《水工混凝土施工规范》（DL/T5144-2001）中的紫铜片品质指标包含（\nA、抗拉强度B、延伸率\nC、冷弯\nD、弹性模量","answer":"ABC","id":"混凝土工程-一-multi-40","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"judge","number":1,"sourcePage":7,"text":"水泥安定性检验有试饼法和雷氏夹法。","answer":"T","id":"混凝土工程-二-judge-01","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":2,"sourcePage":7,"text":"水泥四种矿物成分中，C2S发热量最大，生产中热硅酸盐水泥时，要加以限量。（","answer":"F","id":"混凝土工程-二-judge-02","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":3,"sourcePage":7,"text":"人工砂中的石粉是有害物质。","answer":"F","id":"混凝土工程-二-judge-03","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":4,"sourcePage":7,"text":"水泥混凝土粗、细骨料试验筛均采用方孔筛。","answer":"T","id":"混凝土工程-二-judge-04","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":5,"sourcePage":7,"text":"混凝土抗压强度试验，加荷速率愈快，混凝土抗压强度愈大。","answer":"T","id":"混凝土工程-二-judge-05","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":6,"sourcePage":7,"text":"水泥品种相同情况下，水灰比越大，混凝土凝结时间越短。","answer":"F","id":"混凝土工程-二-judge-06","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":7,"sourcePage":7,"text":"混凝土拌和物的落度随含气量的增加而降低。","answer":"F","id":"混凝土工程-二-judge-07","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":8,"sourcePage":7,"text":"钢筋混凝土结构钢筋锈蚀的主要原因是碳化和氯离子含量超标。","answer":"T","id":"混凝土工程-二-judge-08","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":9,"sourcePage":7,"text":"混凝土徐变试验保持加到试件上的应力不变。","answer":"T","id":"混凝土工程-二-judge-09","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":10,"sourcePage":7,"text":"长径比不同的芯样抗压强度试验，测值大小只与芯样截面面积有关。","answer":"F","id":"混凝土工程-二-judge-10","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":11,"sourcePage":7,"text":"常态混凝土和碾压混凝土初凝时间测定所用贯入阻力仪所采用测针直径一样。","answer":"F","id":"混凝土工程-二-judge-11","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":12,"sourcePage":7,"text":"沥青混凝土拌和物温度对沥青混凝土施工质量影响不大。","answer":"F","id":"混凝土工程-二-judge-12","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":13,"sourcePage":7,"text":"碾压混凝土拌和必须采用机械拌和。","answer":"T","id":"混凝土工程-二-judge-13","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":14,"sourcePage":7,"text":"同一种混凝土用标准立方体试件测定的抗压强度比标准圆柱体测定的抗压强度低。","answer":"F","id":"混凝土工程-二-judge-14","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":15,"sourcePage":7,"text":"同一种混凝土劈裂抗拉强度比轴心抗拉强度低。","answer":"T","id":"混凝土工程-二-judge-15","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":16,"sourcePage":7,"text":"劈拉试验时，需在试件与压板之间垫上垫条，垫条尺寸和形状对劈拉强度测值无影响。","answer":"F","id":"混凝土工程-二-judge-16","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":17,"sourcePage":7,"text":"混凝土碳化消耗混凝土中部分Ca(OH)z，使混凝土碱度降低。","answer":"T","id":"混凝土工程-二-judge-17","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":18,"sourcePage":7,"text":"混凝土抗剪强度随法向应力增加而增大。","answer":"T","id":"混凝土工程-二-judge-18","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":19,"sourcePage":7,"text":"混凝土线胀系数主要由骨料的线胀系数决定。","answer":"T","id":"混凝土工程-二-judge-19","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":20,"sourcePage":7,"text":"混凝土自生体积变形包括胶凝材料水化反应的变形和干缩变形。","answer":"F","id":"混凝土工程-二-judge-20","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":21,"sourcePage":7,"text":"未凝固碾压}昆凝土拌和物性能与常态混凝土完全不同。","answer":"T","id":"混凝土工程-二-judge-21","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":22,"sourcePage":7,"text":"混凝土绝热温升随水泥用量增加而减小。","answer":"F","id":"混凝土工程-二-judge-22","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":23,"sourcePage":7,"text":"砂石的坚固性直接影响混凝土的强度。","answer":"F","id":"混凝土工程-二-judge-23","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":24,"sourcePage":7,"text":"钢筋混凝土用水要求氯化物(以 CI计)含量不大于1200mg/L。","answer":"T","id":"混凝土工程-二-judge-24","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":25,"sourcePage":7,"text":"热轧钢筋检验批重量通常不大于60t，超过60t的部分，每增加40t（或不足40t的余数），增加一个拉\n伸试验试样和一个弯曲试验试样。","answer":"T","id":"混凝土工程-二-judge-25","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":26,"sourcePage":7,"text":"钢筋弯曲试验后，如有一个试件不合格，则另取两倍数量的试件，进行第二次弯曲试验，如有一个试件\n不合格，则该批钢筋即为不合格。","answer":"T","id":"混凝土工程-二-judge-26","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":27,"sourcePage":7,"text":"对钢号不明的钢筋，抽样数量不得少于3根。","answer":"F","id":"混凝土工程-二-judge-27","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":28,"sourcePage":7,"text":"铜片止水常用做岩基上水工建筑物温度变形缝和沉降量大的温度一沉降变形缝的接缝止水。（）","answer":"F","id":"混凝土工程-二-judge-28","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":29,"sourcePage":7,"text":"混凝土强度验收的首要标准是必须有80%以上的抽样强度超过设计强度标准值。","answer":"T","id":"混凝土工程-二-judge-29","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"judge","number":30,"sourcePage":7,"text":"搅拌楼（站）及出机口混凝土拌和物稠度和含气量以设计要求的平均值为基准。","answer":"F","id":"混凝土工程-二-judge-30","typeLabel":"判断题"},{"subject":"混凝土工程","set":"二","type":"single","number":1,"sourcePage":7,"text":"硅酸盐水泥熟料矿物水化速率排序正确的是（)。\nA. CA> CS> C4AF> C3S\nB.C,S >C2S> C4AF >C3A\nC. C3A>C3S> C4AF> C2S\nD.C3S> C2S> C4AF> C3A","answer":"C","id":"混凝土工程-二-single-01","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":2,"sourcePage":7,"text":"水泥或混凝土中碱含量的含义是(\n)。\nA. K20+ Na20\nD.Na20 +0. 658K20\nB.K3O +0. 658Na20\nC. K20 +0. 685Na20","answer":"D","id":"混凝土工程-二-single-02","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":3,"sourcePage":7,"text":"雷氏夹法测定水泥的安定性，当两个试件沸煮前后指针距离增量(C-4)的平均值不大于(\n)时，则判\n定该水泥安定性合格。\nA. 4.0mm\nB.3.5 mm\nC.6.0 mm\nD.5.0 mm","answer":"D","id":"混凝土工程-二-single-03","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":4,"sourcePage":7,"text":"水泥胶砂强度检测中，当三个抗折强度中有超出它们平均值(\n)时，应剔除后再取平均值作为抗折\n强度试验结果。\nA.±15%\nB.±10%\nC.±20%\nD.±25%","answer":"B","id":"混凝土工程-二-single-04","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":5,"sourcePage":8,"text":"测定水泥的标准稠度用水量，是为测定其(\n)做准备，使其具有准确的可比性。\nB．凝结时间和安定性\nA.胶砂强度和凝结时间\nC．胶砂强度和安定性\nD.比表面积和安定性","answer":"B","id":"混凝土工程-二-single-05","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":6,"sourcePage":8,"text":"水泥的初凝时间是(\n（)。\nA.水泥从和水开始到失去流动性所需要的时间。B.水泥从和水开始到水泥浆开始失去塑性的时间。\nC．水泥从和水开始到水泥浆完全失去塑性的时间。D．以上的说法都可以。","answer":"B","id":"混凝土工程-二-single-06","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":7,"sourcePage":8,"text":"测定水泥净浆凝结时间试验中，试验步骤正确的是（)。\n①称取水泥试样500g，以标准稠度用水量制成标准稠度的水泥净浆一次装满试模，振动数次后刮平，\n立即放入湿气养护箱中。记录水泥全部加入水中的时间作为凝结时间的起始时间。\n②初凝时间的测定。试件在湿气养护箱中养护至加水30min时进行第一次测定。\n③首先调整凝结时间测定仪，使试针接触玻璃板时指针对准零点。\n④终凝时间的测定。由水泥全部加入水中至终凝状态的时间为水泥的终凝时间。\nA. 0234 B. @03④ C. 3204\nD. ③②④","answer":"D","id":"混凝土工程-二-single-07","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":8,"sourcePage":8,"text":"沥青针入度试验中，三次测定针人度的平均值为0～49时，则三次测定的针入度值最大差值为(\n)。\nA. 2mm\nB.4 mm\nC.6 mm\nD. 8mm","answer":"A","id":"混凝土工程-二-single-08","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":9,"sourcePage":8,"text":"在测定水泥的安定性试验中，下列试验步骤正确的是()。\n①脱去玻璃板，取下试件，先测量雷氏夹指针尖端的距离，精确到0.5mm，接着将试件放到沸煮箱内\n水中试件架上，指针朝上，然后在(30±5)min内加热至沸并恒沸(180±5)min。\n②沸煮结束后，立即放掉沸煮箱里的热水，打开箱盖，待箱体冷却至室温，取出试件进行辨别。\n③将预先准备好的雷氏夹放在已稍擦油的玻璃板上，并立即将已制好的标准稠度的水泥净浆一次装满\n雷氏夹，装浆时一只手轻扶雷氏夹，另一只手用宽约10mm的小刀插捣数次，然后抹平，盖上涂油\n的玻璃板。随即将试件移至湿气养护箱内养护(24+2)h。\n④每个试样需成型两个试件，每个雷氏夹应配备质量为75～85g的玻璃板两块。一垫一盖，凡与水泥\n净浆接触的玻璃板和雷氏夹内表面都要稍稍地涂上一层油。\nD.0432\nA.3402\nB.④302C.@430","answer":"B","id":"混凝土工程-二-single-09","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":10,"sourcePage":8,"text":"水泥胶砂流动度试验中，下列试验步骤正确的是(\n①在拌和胶砂的同时，用湿布抹擦跳桌台、捣棒、带锥圆模和模套内壁，并把它们置于玻璃板中心，\n盖上湿布。\n②制备胶砂。\n③将拌好的水泥胶砂迅速地分两层装入模内，按照规定的次数振捣胶砂试样。\n④跳动完毕，用卡尺测量水泥胶砂底面最大扩散直径与其垂直的直径，计算平均值，取整数，以mm\n为单位表示，即为该用水量的水泥胶砂流动度。\n③振压完毕，取下模套，用小刀由中间边缘分两次将高出带锥圆模的胶砂刮去。\nA. 02346 B. @036④\nC. 03246\nD. 03254","answer":"B","id":"混凝土工程-二-single-10","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":11,"sourcePage":8,"text":"在做水泥胶砂试件的抗折强度试验时，试件放人抗折夹具内，应该使试件的(\n)与圆柱接触。\nA．底面\nB. 侧面\nC．正面\nD.任何一面","answer":"B","id":"混凝土工程-二-single-11","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":12,"sourcePage":8,"text":"工程中需要使用海砂配置混凝土时，必须对海砂检验的项目是(\n（)。\nA.颗粒级配\nB.含泥量\nC．泥块含量\nD．氯离子含量","answer":"D","id":"混凝土工程-二-single-12","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":13,"sourcePage":8,"text":"下列关于砂的表观密度简易法试验操作步骤正确的顺序是()。\n①将样品在潮湿状态下用四分法缩分至120g左右，在(105±5)℃的烘箱中烘干至恒重，并在干燥器中\n冷却至室温，分成大致相等的两份备用。\n②试样全部人瓶中后，用瓶内的水将粘附在瓶颈和瓶壁的试样洗入水中，摇转李氏瓶以排除气泡，静\n置约24h后，记录瓶中水面升高后的体积（V2）。\n③向李氏瓶中注入冷开水至一定刻度处，擦干瓶颈内部附着水，记录水的体积（）。\n④称取烘干试样50g(mo)徐徐装入盛水的李氏瓶中。\nA.0302\nB.023④\nC.@403\nD.0423","answer":"D","id":"混凝土工程-二-single-13","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":14,"sourcePage":9,"text":"用虹吸管法检测含泥量的试验步骤正确的是()。\n①用搅拌棒搅拌约1min（单向旋转），以适当宽度和高度的闸板闸水，使水停止旋转。经20～25s后\n取出闸板，然后从上到下用虹吸管小心地将浑浊液吸出，虹吸管最低位置应距离砂面不少于30mm。\n②最后将容器中的清水吸出，把洗净的试样倒人浅盘并在(105±5)℃的烘箱中烘干至恒重，取出，冷却\n至室温后称砂重(ml)。\n③称取烘干的试样约500g(mo)，置于容器中，并注入饮用水，使水面高出砂面约150mm浸泡2h，浸\n泡的过程中每隔一段时间搅拌一次，使尘屑、淤泥和黏土与砂分离。\n④再倒入清水，重复上述过程，直到吸出的水与清水的颜色基本一致为止。\nA.0324\nB.③04C.3240D.03④②","answer":"B","id":"混凝土工程-二-single-14","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":15,"sourcePage":9,"text":"用硫酸钡比浊法测定水中的硫酸盐，下列试验顺序正确的是(\n（)。\n①调节电磁搅拌器转速，使溶液在搅拌时不外溅，并能使0.2g氯化钡在10～30s间溶解。转速确定后，\n在整批测定中不能改变。\n②搅拌稳定后加入1小勺（约0.2g）氯化钡晶体，并立即计时，搅拌1min5s（由加入氯化钡时开始计\n算），放置10min，立即用分光度计（波长420nm，采用3cm比色Ⅲ），以加有稳定溶液的过滤水样\n作参比，测定吸光度。\n③将水样过滤，吸取50mL过滤水样置于100mL烧杯中。若水样中硫酸盐含量超过40mL/L，可少取\n水样(S042不大于2 mg)并用纯水稀释至 50 mL。\n④加入2.5mL稳定溶液，并将烧杯置于电磁搅拌器上。\n③由标准曲线查出测定水样中的硫酸盐的含量。\n③绘制标准曲线。\nA. 023466\nB. 034266\nC. 302466\nD. 043662","answer":"B","id":"混凝土工程-二-single-15","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":16,"sourcePage":9,"text":"有活性骨料的混凝土，混凝土的总碱量不超过(\n)。\nC. 6.0 kg/m3\nA. 3.0 kg/m3\nB.3.0%\nD.6.0%","answer":"A","id":"混凝土工程-二-single-16","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":17,"sourcePage":9,"text":"砂石中含泥量的定义是：粒径小于(\n)的颗粒的含量。\nA. 1.25 mm\nB.0.16 mm\nC.0.08 mm\nD.0.63 mm","answer":"C","id":"混凝土工程-二-single-17","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":18,"sourcePage":9,"text":"骨料碱活性砂浆棒快速法适用于测定骨料在砂浆中的潜在有害的(\n)反应。\nB.碱一碳酸盐\nC.碱一磷酸盐\nA.碱一硅酸盐\nD.碱一铝酸盐","answer":"A","id":"混凝土工程-二-single-18","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":19,"sourcePage":9,"text":"掺引气剂混凝土的含气量为（）。\nA 3.5% ~4.5%\nB.4.5%~5.5%\nC.5.5%~6.5%\nD.6.5%~7.5%","answer":"B","id":"混凝土工程-二-single-19","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":20,"sourcePage":9,"text":"HRBF500表示屈服强度最小值为 500 MPa 的（）。\nA.热轧带肋钢筋\nB.细晶粒热轧光圆钢筋\nC.细晶粒热轧带肋钢筋\nD.细晶粒冷轧光圆钢筋","answer":"C","id":"混凝土工程-二-single-20","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":21,"sourcePage":9,"text":"热轧光圆钢筋要求最大伸长率不小于（）。\nA. 5%\nB. 7.5%\nC. 12%\nD. 10%","answer":"D","id":"混凝土工程-二-single-21","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":22,"sourcePage":9,"text":"Rp0.2 表示（）。\nA．规定非比例延伸率为20%时的应力\nB.规定比例延伸率为20%时的应力\nC.规定非比例延伸率为0.2%时的应力\nD.规定比例延伸率为0.2%时的应力","answer":"C","id":"混凝土工程-二-single-22","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":23,"sourcePage":9,"text":"冷轧带肋钢筋CRB550拉伸试验试样的原始标距和试样总长度为（）。\nA. Lo (10d)、Lt>17d\nB. Lo (17d)、Lt≥10d\nC. Lo (5d)、Lt≥12d\nD. Lo(12d)、Lt ≥5d","answer":"A","id":"混凝土工程-二-single-23","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":24,"sourcePage":9,"text":"钢筋拉伸试验时，若仅测定下屈服强度ReL时.，在试样届服期间，应变速率应在(\n)之间，应变速\n率应尽可能保持恒定。\nA.0.002 5～0.025/s\nB.0.00025~0.0025/s\nC.0.00025~0.025/s\nD.0. 000 025～0.002 5/s","answer":"B","id":"混凝土工程-二-single-24","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":25,"sourcePage":9,"text":"测定钢筋抗拉强度时，塑性范围的应变速率不应超过(\n)。\nA. 0.8/s\nB.0.000 8/s\nC.8/s\nD.0.008/s","answer":"D","id":"混凝土工程-二-single-25","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":26,"sourcePage":9,"text":"混凝土强度回弹检测中，碳化深度的测量值(\n)时，按无碳化处理。\nA.大于4.0mm\nB.小于4.0 mm\nC. 大于 0.4 mm\nD. 小于 0.4 mm","answer":"D","id":"混凝土工程-二-single-26","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":27,"sourcePage":9,"text":"水泥取样应有代表性，可以连续取，也可以从20个以上不同部位取等量样品，总量不少于(\nA. 12 kg\nB.20 kg\nC.10 kg\nD.25 kg\n)的方法。","answer":"A","id":"混凝土工程-二-single-27","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":28,"sourcePage":10,"text":"砂的筛分析试验，是评价其（\nA．最大粒径\nB．粗细程度和颗粒级配\nC.含泥量\nD.松散堆积密度","answer":"B","id":"混凝土工程-二-single-28","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":29,"sourcePage":10,"text":"碎石的超径、逊径含量检测频次为(\nD. 2 次/小时\nA.1～2次/天\nB.1 次/2天\nC.1次/小时","answer":"A","id":"混凝土工程-二-single-29","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":30,"sourcePage":10,"text":"钢筋拉伸试验中，在屈服期间不计初始瞬时应力的最低应力，称为(\n)。\nA．上屈服点\nC．抗拉强度\nD．比例极限\nB.下屈服点","answer":"B","id":"混凝土工程-二-single-30","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":31,"sourcePage":10,"text":"选用下列哪种外加剂可提高混凝土的抗冻性？（）\nA．防冻剂B.引气剂\nD．减水剂\nC.缓凝剂","answer":"B","id":"混凝土工程-二-single-31","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":32,"sourcePage":10,"text":"骨料检验已判为有潜在危害性反应的活性骨科，宜选用下列哪种碱含量的水泥？（）\nA检验结果碱含量为0.58%\nB.检验结果碱含量为1.08%\nC.检验结果碱含量为1.58%\nD.检验结果碱含量为2.08%","answer":"A","id":"混凝土工程-二-single-32","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":33,"sourcePage":10,"text":"II级粉煤灰的需水量比不大于(\nA. 110%\nB.105%\nC.100%\nD.95%","answer":"B","id":"混凝土工程-二-single-33","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":34,"sourcePage":10,"text":"混凝土拌和生产中，应定期检验拌和物的均匀性，决定混凝土的(\nA.用水量\nB．配合比\nC．最佳拌和时间\nD.含气量","answer":"C","id":"混凝土工程-二-single-34","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":35,"sourcePage":10,"text":"混凝土搅拌楼（站）应定期校正（）。\nB．电压\nA.水压\nC.风压\nD．称量设备","answer":"D","id":"混凝土工程-二-single-35","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":36,"sourcePage":10,"text":"对有抗冻性要求的混凝土，现场抽样测定混凝土的(\nD．压力泌水率\nA．表观密度\nB.含气量\nC.含水率","answer":"B","id":"混凝土工程-二-single-36","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":37,"sourcePage":10,"text":"混凝土劈裂抗拉强度试验，标准试件所用混凝土最大骨料粒径不应大于(\nA. 20 mm\nB.40 mm\nC.60 mm\nD.80 mm","answer":"A","id":"混凝土工程-二-single-37","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":38,"sourcePage":10,"text":"现场抽样测定标准立方体抗压强度的试件尺寸是(\n)立方体。\nA. 10 cmx10 cmx10 cm\nB.15 cmx15 cm×15 cm\nC. 20 cm×20 cmx20 cm\nD.30cm×30cm×30cm","answer":"B","id":"混凝土工程-二-single-38","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":39,"sourcePage":10,"text":"采用超声回弹综合法检测混凝土抗压强度，超声测点应布置在回弹测式的同一测区内，在每个测区相对\n应的测面上布置强度测点，每个测区布置(\n)个测点。\nA. 1\nB.2\nC.3\nD. 8","answer":"C","id":"混凝土工程-二-single-39","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"single","number":40,"sourcePage":10,"text":"回弹法推定混凝土抗压强度时，宜优先采用（\nC．专用测强曲线\nA.统一测强曲线\nB．地区测强曲线\nD. 经验公式","answer":"B","id":"混凝土工程-二-single-40","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":1,"sourcePage":10,"text":"水工混凝土工程质量检测的依据有(\n)。\nA．法律、法规、规章的规定\nB．国家标准、水利水电行业标准\nC．工程承包合同认定的其他标准和文件\nD．批准的设计文件、金属结构、机电设备安装等技术说明书","answer":"ABCD","id":"混凝土工程-二-multi-01","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":2,"sourcePage":10,"text":"复合硅酸盐水泥的细度要求为（）。\nA.80μm标准筛筛余百分数不大于10%\nB.45μum标准筛筛余百分数不大于10%\nC.80μm标准筛筛余百分数不大于30%\nD.45μum标准筛筛余百分数不大于30%","answer":"AD","id":"混凝土工程-二-multi-02","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":3,"sourcePage":10,"text":"水泥的标准稠度状态为（)。\nA．标准法中试杆沉人净浆并距离底板28mm±2mm\nB．代用法中试锥沉人净浆的下沉深度为28mm2mm\nC．标准法中试杆沉入净浆并距离底板6mm士1mm\nD.代用法中试锥沉入净浆的下沉深度为6mm士1mm","answer":"BC","id":"混凝土工程-二-multi-03","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":4,"sourcePage":10,"text":"水泥颗粒越细，则（)。\nA．水化速度越快且越充分\nB．水泥的需水量越大\nC．早期强度也越高\nD．水泥石体积收缩率越大","answer":"ABCD","id":"混凝土工程-二-multi-04","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":5,"sourcePage":11,"text":"砂的含泥量超过标准要求时，对混凝土的(\n)等性能均会产生不利的影响。\nD.抗冻\nA．强度\nB.干缩\nC.抗冲磨","answer":"ABCD","id":"混凝土工程-二-multi-05","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":6,"sourcePage":11,"text":"大体积混凝土应尽量采用较大粒径的石子，这样可以（）。\nA.降低砂率\nB.．减少混凝土用水量和水泥用量\nC.减少混凝土温升及干缩裂缝\nD.．提高混凝土强度","answer":"ABCD","id":"混凝土工程-二-multi-06","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":7,"sourcePage":11,"text":"原则上，凡是（)的水，不得用于拌制混凝土。\nA．影响混凝土的和易性及凝结\nB．有损混凝土强度增长\nC.降低混凝土耐久性，加快钢筋腐蚀及导致预应力钢筋脆断\nD.污染混凝土表面","answer":"ABCD","id":"混凝土工程-二-multi-07","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":8,"sourcePage":11,"text":"水工建筑物中，变形缝的止水结构包括（）。\nA．铜片止水\nB．橡胶材料止水\nC．塑料材料止水\nD.填料止水","answer":"ABCD","id":"混凝土工程-二-multi-08","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":9,"sourcePage":11,"text":"水工混凝土建筑物的温度一沉降变形缝对止水填料的性能要求包括(\n)。\nA．具有一定的密度\nB.具有低温流变性能\nC．具有高温黏性\nD.填料的拉伸强度小于填料与混凝土黏结强度","answer":"ABCD","id":"混凝土工程-二-multi-09","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":10,"sourcePage":11,"text":"影响硅酸盐水泥安定性的不良原因有（)。\nC．过量的石膏\nA.f-CaO的量过多\nB.f-MgO 的量过多\nD. Ca(OH)2 的量过多","answer":"ABC","id":"混凝土工程-二-multi-10","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":11,"sourcePage":11,"text":"水泥胶砂强度检验环境条件是（）。\nA.实验室温度20℃±2℃，相对湿度≥50%\nB.实验室温度大于17℃且小于25℃\nD.养护环境温度20℃±1℃，相对湿度≥90%\nC.养护环境温度20℃±3℃，相对湿度≥90%","answer":"AD","id":"混凝土工程-二-multi-11","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":12,"sourcePage":11,"text":"碾压混凝土配合比设计龄期宜选择(\nD. ly\nA. 28d 1\nB.90 d\nC. 180 d","answer":"BC","id":"混凝土工程-二-multi-12","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":13,"sourcePage":11,"text":"聚合物水泥混凝土（砂浆）的特性(\n)。\nA.提高混凝土抗裂性\nB．提高混凝土黏结强度\nC．提高混凝土耐久性\nD．提高混凝土抗渗性","answer":"ABCD","id":"混凝土工程-二-multi-13","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":14,"sourcePage":11,"text":"优质粉煤灰掺人混凝土中的效果是（）\nA.改善和易性\nB．降低绝热温升\nC.抑制碱一骨料反应\nD.后期徐变增大","answer":"ABCD","id":"混凝土工程-二-multi-14","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":15,"sourcePage":11,"text":"下列4个粉煤灰样品的需水量比检验结果，哪几个达到I级粉煤灰质量标准？（）\nA.需水量比为90%\nB.需水量比为94%\nC.需水量比为98%\nD.需水量比为102%","answer":"AB","id":"混凝土工程-二-multi-15","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":16,"sourcePage":11,"text":"通过砂料颗粒级配筛分试验，可以取得砂的下列参数和类别。（）\nA．砂的细度模数\nB.砂料的粗、中、细分类\nC．砂料的平均粒径\nD.．砂料的表观密度","answer":"ABC","id":"混凝土工程-二-multi-16","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":17,"sourcePage":11,"text":"抑制混凝土碱一骨料反应的掺合料有哪些？（）\nA．石粉\nB．粉煤灰\nC.磨细矿渣粉D.粉土","answer":"BC","id":"混凝土工程-二-multi-17","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":18,"sourcePage":11,"text":"大坝外部碾压混凝土现场抽样检测相对压实度不得小于(\n)；内部碾压混凝土相对压实度不得小于(\nC. 97%\nD. 98%\nA. 95%\nB. 96%","answer":"CD","id":"混凝土工程-二-multi-18","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":19,"sourcePage":11,"text":"根据使用性质的不同，石灰可以分为(\nB.水硬性石灰\nC．消石灰\nD．镁质石灰\nA.气硬性石灰","answer":"AB","id":"混凝土工程-二-multi-19","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":20,"sourcePage":11,"text":"通过对石灰消化时体积变化机理的研究，可以通过(\n)方法来确毫控制体积变化。\nB．改变水灰比\nD．掺加外加剂\nA．改变石灰石的细度\nC.改变消化温度","answer":"ABCD","id":"混凝土工程-二-multi-20","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":21,"sourcePage":11,"text":"下列牌号中，属于热轧带肋钢筋的是（）。\nD.HRB500\nA.HRB335\nB.HRB400\nC.HRB425","answer":"ABD","id":"混凝土工程-二-multi-21","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":22,"sourcePage":11,"text":"在检测焊接钢筋试验中，需要做拉伸试验的焊接方式有(\nA．点焊\nB.闪光对焊\nC.电弧焊接头\nD．电渣压力焊E.．气压焊","answer":"ABCDE","id":"混凝土工程-二-multi-22","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":23,"sourcePage":11,"text":"钢材常常用(\n)指标来表示钢材的塑性。\nA．冲击韧性\nB.伸长率\nC.冷脆性\nD.断面收缩率","answer":"BD","id":"混凝土工程-二-multi-23","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":24,"sourcePage":11,"text":"目前，测定钢材硬度的方法很多，常用的有（\nA．布氏硬度\nB．里氏硬度\nC.．洛氏硬度\nD.维氏硬度\n)等指标判别的。","answer":"ACD","id":"混凝土工程-二-multi-24","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":25,"sourcePage":11,"text":"烧结普通砖的抗风化性能通常是(\nA．抗冻性\nB.吸水率\nC.．饱和系数\nD.孔洞率","answer":"ABC","id":"混凝土工程-二-multi-25","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":26,"sourcePage":12,"text":"缓凝剂进人工地（或混凝土搅拌站）的检验项目应包括(\n)。\nA.pH值\nC、混凝土凝结时间\nD.混凝土落度\nB．密度\nE．减水率","answer":"ABC","id":"混凝土工程-二-multi-26","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":27,"sourcePage":12,"text":"混凝土结构裂缝的修补灌浇材料，应具备以下特点(\n)。\nA．黏度低\nB．可灌性好\nC．固化后体积收缩小\nD.固化时间可按工艺调节","answer":"ABCD","id":"混凝土工程-二-multi-27","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":28,"sourcePage":12,"text":"港口工程修补材料抗折和抗压强度测定试验步骤中正确的是(\n)。\nA．用修补材料成型3条40mmx40mm×160mm的试件，24h后拆模\nB、试件养护条件为：温度(20±2)℃，相对湿度65%±5%，恒温、恒湿，养护28d\nC.采用水泥抗折机先对3条试件分别进行抗折试验\nD.用6个断块进行抗压试验，受压面积40mmx40 mm，加载速度为(5±0.5%)kN/min","answer":"ABCD","id":"混凝土工程-二-multi-28","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":29,"sourcePage":12,"text":"淡水环境混凝土，不得不采用碱活性骨料时，宜采用（)。\nB.低钙（CaO含量<20%）粉煤灰硅酸盐水泥\nA.矿渣硅酸盐水泥\nC．火山灰质硅酸盐水泥\nD．含碱量小于0.60%的硅酸盐水泥\nE．普通硅酸盐水泥","answer":"ABD","id":"混凝土工程-二-multi-29","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":30,"sourcePage":12,"text":"混凝土拌和物的性能主要表现在哪些方面？（）\nA.流动性\nD．表观密度\nB.含气量\nC．凝结时间","answer":"ABC","id":"混凝土工程-二-multi-30","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":31,"sourcePage":12,"text":"混凝土静力弹性模试验测出一条应力一应变曲线，曲线上选两点走或直线走，直线的斜率即是混凝土压\n缩弹性模量，此两点的应力是(\nC．40%极限抗压强度\nD.50%极限抗压强度\nA. 0.5 MPa\nB. 5MPa","answer":"AC","id":"混凝土工程-二-multi-31","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":32,"sourcePage":12,"text":"喷射混凝土必须掺用减水剂和(\n)，一般不掺用(\n)。\nA.引气剂\nB.缓凝剂\nC.速凝剂\nD．泵送剂","answer":"AC","id":"混凝土工程-二-multi-32","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":33,"sourcePage":12,"text":"哪些试验条件使混凝土极限拉伸试验测值偏小？（）\nA．试件成型装料不均匀，骨料集中，导致测值偏低\nB．试件几何形心与试验机轴有偏心，使测值偏小\nC.加速速率过快，导致拉伸值偏低\nD.养护室相对湿度过大","answer":"ABC","id":"混凝土工程-二-multi-33","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":34,"sourcePage":12,"text":"进行混凝土抗冻试验时，判断试件是否冻坏的依据是(\n)。\nA.相对动弹性模量下降至初始值的80%\nB相对动弹性模量下降至初始值的60%\nC.质量损失率达5%\nD.强度损失率达5%","answer":"BC","id":"混凝土工程-二-multi-34","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":35,"sourcePage":12,"text":"水下不分散混凝土可在水深不大于(\n)情况下直接浇筑。\nA. 30 cm\nB.50 cm\nC.70 cm\nD.90 cm","answer":"AB","id":"混凝土工程-二-multi-35","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":36,"sourcePage":12,"text":"提高混凝土抗裂性有哪些措施？（\nA.选择线胀系数低的骨料\nB．采用活性高的掺合料\nC.选用发热量低的水泥\nD．夏季高温浇筑混凝土","answer":"ABC","id":"混凝土工程-二-multi-36","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":37,"sourcePage":12,"text":"提高水工建筑物过水面混凝土抗冲磨强度的措施有(\nA.采用42.5等级中热硅酸盐水泥\nB．混凝土强度等级为C40，不宜过高控制混凝土的脆性\nC．选用硬质耐磨料如花岗岩、铁矿石等\nD.面层铺硬木条保护","answer":"ABCD","id":"混凝土工程-二-multi-37","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":38,"sourcePage":12,"text":"影响混凝土徐变的外部因素主要有（)。\nB．加荷应力\nC．持荷时间\nD.混凝土外加剂掺量过度，不凝固\nA.环境温度与湿度","answer":"ABC","id":"混凝土工程-二-multi-38","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":39,"sourcePage":12,"text":"混凝土轴向拉伸试验，可同时测出以下参数(\nC．极限拉伸\nA.轴向抗拉强度\nB.拉伸弹模\nD. 波桑比","answer":"ABC","id":"混凝土工程-二-multi-39","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"二","type":"multi","number":40,"sourcePage":12,"text":"超声波检测混凝土内部缺陷，当超声波经过缺陷时，用于评估缺陷的哪些参数将发生变化？（\nA．波速\nB.阻尼系数\nC.波幅\nD. 波形","answer":"ACD","id":"混凝土工程-二-multi-40","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"三","type":"judge","number":1,"sourcePage":13,"text":"水泥加水拌和后水化反应就开始，可分为四个阶段，即初始反应期、诱导期、凝结期与硬化期。（）","answer":"T","id":"混凝土工程-三-judge-01","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":2,"sourcePage":13,"text":"水泥水化速率与温度成反比，温度愈高，凝结硬化愈慢。","answer":"F","id":"混凝土工程-三-judge-02","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":3,"sourcePage":13,"text":"在相同用水量条件下，选用需水量比较低的粉煤灰，混凝土有较好的流动性。","answer":"T","id":"混凝土工程-三-judge-03","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":4,"sourcePage":13,"text":"粉煤灰的需水量比硅粉小许多。","answer":"T","id":"混凝土工程-三-judge-04","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":5,"sourcePage":13,"text":"粉煤灰必须在碱性激发剂和硫酸盐激发剂作用下，才能发挥二次水化反应。","answer":"T","id":"混凝土工程-三-judge-05","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":6,"sourcePage":13,"text":"碾压混凝土采用人工砂时，石粉含量不易超过10%，否则会对和易性不利。","answer":"F","id":"混凝土工程-三-judge-06","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":7,"sourcePage":13,"text":"钢筋混凝土结构钢筋锈蚀的主要原因是碳化和氯离子含量超标。","answer":"T","id":"混凝土工程-三-judge-07","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":8,"sourcePage":13,"text":"未凝固碾压混凝土拌和物性能与常态混凝土完全不同。","answer":"T","id":"混凝土工程-三-judge-08","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":9,"sourcePage":13,"text":"碾压混凝土拌和可以采用人工拌和与机械拌和两种。","answer":"F","id":"混凝土工程-三-judge-09","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":10,"sourcePage":13,"text":"劈裂抗拉强度试验时，需在试件与压板之间垫上垫条，垫条形状和尺寸与试验结果无关。","answer":"F","id":"混凝土工程-三-judge-10","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":11,"sourcePage":13,"text":"常态混凝土和碾压混凝土测定初凝时间都采用贯人阻力仪，所用测针直径一样。（","answer":"F","id":"混凝土工程-三-judge-11","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":12,"sourcePage":13,"text":"热轧带肋钢筋的牌号由HRB和屈服点的最大值构成。","answer":"F","id":"混凝土工程-三-judge-12","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":13,"sourcePage":13,"text":"热轧带肋钢筋的弯曲试验，按规定的弯心直径弯曲90°后钢筋不得产生裂纹。","answer":"F","id":"混凝土工程-三-judge-13","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":14,"sourcePage":13,"text":"水工混凝土掺用引气剂以增强其抗冻性，含气量应控制在3.5%～5.5%范围内。","answer":"T","id":"混凝土工程-三-judge-14","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":15,"sourcePage":13,"text":"石料的吸水率大，会影响骨料界面和水泥石的黏结强度，同时会降低其抗冻性。","answer":"T","id":"混凝土工程-三-judge-15","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":16,"sourcePage":13,"text":"水泥安定性用试饼法检验时，试饼直径70～80mm，中心厚约10mm，边缘渐薄。","answer":"T","id":"混凝土工程-三-judge-16","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":17,"sourcePage":13,"text":"为提高大坝混凝土的抗裂性，要求提高水泥质量，水泥颗粒越细越好。","answer":"F","id":"混凝土工程-三-judge-17","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":18,"sourcePage":13,"text":"对钢号不明的钢筋，弯曲试验的抽样数量不得少于6根。","answer":"T","id":"混凝土工程-三-judge-18","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":19,"sourcePage":13,"text":"用于混凝土内部缺陷和裂缝深度检测的超声波属于纵波。","answer":"T","id":"混凝土工程-三-judge-19","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":20,"sourcePage":13,"text":"对同一种混凝土，换能器的频率越高，超声波衰减越小，穿透的距离就越远。（","answer":"F","id":"混凝土工程-三-judge-20","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":21,"sourcePage":13,"text":"混凝土质量检控，混凝土强度验收采用抽样检验法。","answer":"T","id":"混凝土工程-三-judge-21","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":22,"sourcePage":13,"text":"总体混凝土强度呈正态分布。","answer":"T","id":"混凝土工程-三-judge-22","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":23,"sourcePage":13,"text":"为提高止水带的抗绕渗能力，可以加大止水带翼板的厚度。","answer":"F","id":"混凝土工程-三-judge-23","typeLabel":"判断题"},{"subject":"混凝土工程","set":"三","type":"judge","number":24,"sourcePage":13,"text":"铜片止水带常用作水工建筑物沉降量大的温度一沉降变形缝的接缝止水。","answer":"F","id":"混凝土工程-三-judge-24","typeLabel":"判断题"},{"subject":" ":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":6,"sourcePage":13,"text":"．粉煤灰的细度检验采用方孔筛的尺寸为(\n)。\nA.150 μm\nB.80 μm\nC.88μm\nD.45μm","answer":"D","id":"混凝土工程-三-single-06","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":7,"sourcePage":14,"text":"粗骨料的吸水率要求小于(\nA.1.5%\nB.2.0%\nC.2.5%\nD.3.0%","answer":"C","id":"混凝土工程-三-single-07","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":8,"sourcePage":14,"text":"采用砂浆棒快速法检测骨料碱活性，当为(\n)时判为非活性骨料。\nA.砂浆试件14d的膨胀率小于0.1%\nB.砂浆试件28d的膨胀率小于0.1%\nC.砂浆试件14d的膨胀率小于0.2%\nD.砂浆试件28d的膨胀率小于0.2%","answer":"A","id":"混凝土工程-三-single-08","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":9,"sourcePage":14,"text":"下列热物理参数中，（)的含义是单位质量的混凝土温度升高1℃或降低1℃所吸收或放出的热量。\nA．导热系数B．导温系数\nC．比热\nD.线膨胀系数，","answer":"C","id":"混凝土工程-三-single-09","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":10,"sourcePage":14,"text":"碾压混凝土拌和物工作度测定的指标为（)。\nA．落度B．扩度\nD. VC值\nC.维勃稠度VB值","answer":"D","id":"混凝土工程-三-single-10","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":11,"sourcePage":14,"text":"下列措施中，不利于提高混凝土抗裂性的技术措施是(\n)。\nA.采用高Mg0含量(3.5%～5.0%)的水泥\nB.适当引气\nC.采用线膨胀系数低的骨料\nD．采用矿渣粉等量替代粉煤灰","answer":"D","id":"混凝土工程-三-single-11","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":12,"sourcePage":14,"text":"自流平自密实混凝土不宜掺用(\nA.减水剂\nC．引气剂\nD.速凝剂\nB.缓凝剂\n)。","answer":"D","id":"混凝土工程-三-single-12","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":13,"sourcePage":14,"text":"沥青混凝土中，粗骨料最大粒径应不大于表层厚度的(\nA. 1/5\nB. 2/5\nC.1/3\nD. 1/2","answer":"C","id":"混凝土工程-三-single-13","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":14,"sourcePage":14,"text":"掺合料等量取代水泥，不能降低胶凝材料水化热的掺合料为(\nD.石灰岩粉“_\nA.粉煤灰\nB．硅粉\nC.矿渣粉","answer":"B","id":"混凝土工程-三-single-14","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":15,"sourcePage":14,"text":"GB1499--2007规定，根据需方要求进行反向弯曲试验，先后弯曲方向及弯曲角度为(\nA．先正向45°再反向23°\nB．先正向90°再反向20°。\nC.先反向45°再正向23°\nD．先正向45°再反向90°","answer":"B","id":"混凝土工程-三-single-15","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":16,"sourcePage":14,"text":"制造止水铜片用的铜材是(\nA．黄铜B．软态紫铜\nC．硬态紫铜\nD.软态黄铜","answer":"B","id":"混凝土工程-三-single-16","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":17,"sourcePage":14,"text":"F型断面的止水铜片其直翼板的长度决定于（\n)。\nA．铜片的拉伸强度\nB．铜片的拉伸变形率\nC．铜片与水泥砂浆的黏附强度\nD.混凝土的拉伸变形","answer":"C","id":"混凝土工程-三-single-17","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":18,"sourcePage":14,"text":"止水铜片连接应采用（）。\nA．搭接熔焊\nB.黄铜斜焊一遍\nC．黄铜钎焊两遍\nD.银焊","answer":"C","id":"混凝土工程-三-single-18","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":19,"sourcePage":14,"text":"变形缝相对静止状态时止水带的抗绕渗能力决定于(\nA.材质的不透水性\nB.材质的回弹力\nC．材质的永久压缩变形\nD.材质的耐水性","answer":"B","id":"混凝土工程-三-single-19","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":20,"sourcePage":14,"text":"橡胶止水带的连接应采用（\nA．止水带搭接硫化\nB.．止水带的生胶头搭接硫化\nC．止水带搭接黏结\nD.止水带搭接用螺栓拧紧","answer":"D","id":"混凝土工程-三-single-20","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":21,"sourcePage":14,"text":"热轧带肋钢筋力学性能检测的试样数为(\n)根。\nA. 1 B. 2 C. 3\nD. 4","answer":"B","id":"混凝土工程-三-single-21","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":22,"sourcePage":14,"text":"热轧带肋钢筋HRB335的牌号中335表示(\nA.钢筋屈服点最小值\nB.钢筋抗拉强度\nC.钢筋伸长率\nD.钢筋公称直径","answer":"A","id":"混凝土工程-三-single-22","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":23,"sourcePage":14,"text":"钢筋拉伸时由受力到拉断的全过程呈现的机械性能可分为4个阶段，即（）。\nA．弹性、塑性、强化、缩颈\nB．弹性、屈服、强化、缩颈\nC．弹性、屈服、强化、断开\nD.弹性、塑性、强化、断开","answer":"B","id":"混凝土工程-三-single-23","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":24,"sourcePage":14,"text":"采用超声回弹综合法检测混凝土强度，超声测点应布置在回弹测试的同一测区内，在每个测区内的相\n对测试面上，应各布置（)个测点。\nC. 3\nD. 8\nA. 1 B. 2","answer":"C","id":"混凝土工程-三-single-24","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":25,"sourcePage":14,"text":"大坝结构设计和温度应力计算中，抗拉强度宜用哪种抗拉强度作为标准值（\nA：轴向抗拉强度\nB．劈裂抗拉强度\nC.弯曲抗拉强度\nD.断裂强度","answer":"A","id":"混凝土工程-三-single-25","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":26,"sourcePage":14,"text":"根据《水工混凝土施工规范》（DL/T5144-2001），混凝土拌和生产过程中，砂子、小石子的含水率每\n（）检测1次。\nA. 4h\nB. 8h C． 台班\nD. 天","answer":"A","id":"混凝土工程-三-single-26","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":27,"sourcePage":15,"text":"现场抽样测定标准立方体抗压强度的试件（）检测1次。\nB. 150X150×150 (mm²)\nA. 100×100X100 (mm3)\nC. 200X200X200 (mm²)\nD. 300X300X300 (mm²)","answer":"B","id":"混凝土工程-三-single-27","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":37,"sourcePage":15,"text":"大坝碾压混凝土设计抗压强度保证率为(\n)。\nA. 75%\nB. 80%\nC. 90%\nD. 95%","answer":"B","id":"混凝土工程-三-single-37","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":38,"sourcePage":15,"text":"碾压混凝土VC值测试时计时终点为(\n)。\nA．透明塑料压板整个底面与碾压混凝土接触面的空隙都被水泥浆填满\nB．透明塑料压板的整个底面都与水泥浆接触，允许存在少量闭合气泡\nC．塑料压板的周边侧面全部被泛上来的水泥浆覆盖\nD塑料压板周边全部出现水泥浆","answer":"D","id":"混凝土工程-三-single-38","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":39,"sourcePage":15,"text":"海水环境混凝土配合比设计中，混凝土配制强度应满足（)。\nA．设计强度\nB．耐久性要求所决定的强度\nC．设计强度或耐久性要求所决定的强度\nD.设计强度和耐久性要求所决定的强度","answer":"D","id":"混凝土工程-三-single-39","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"single","number":40,"sourcePage":15,"text":"测定混凝土中砂浆水溶性氯离子含量时，试样应()。\nA．用小锤敲碎，剔除砂粒\nB.敲碎试样，取0.63mm筛以下的\nC.研磨砂浆至全部通过0.63mm筛\nD．用水浸泡溶出","answer":"C","id":"混凝土工程-三-single-40","typeLabel":"单项选择题"},{"subject":"混凝土工程","set":"三","type":"multi","number":1,"sourcePage":15,"text":"水工混凝土工程质量检测的依据是(\n)。\nA．国家标准、水利水电行业标准\nB．工程承包合同认定的其他标准和文件\nC.承包单位自定规程\nD.批准的设计文件、金属结构、机电设备安装等技术说明书","answer":"ABD","id":"混凝土工程-三-multi-01","typeLabel":"多项选择题"},{"subject":"混凝土工程","set":"三","type":"multi","number":2,"sourcePage":15,"text":"提高水泥强度的技术措施包括(\nA：提高C3S矿物成分含量\nB．提高C3A矿物成分含量\nC.增加水泥比表面积\nD．增加石膏掺量","answer
